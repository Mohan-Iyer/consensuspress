# =============================================================================
server_side:

  endpoint:
    path: "POST /api/v1/consensus"
    server: "Railway — app.seekrates-ai.com"
    status: "NOT STARTED"
    blocking: "Live integration testing (not blocking plugin development — mocks decouple)"

  description: |
    Thin wrapper around consensus_engine.py. Receives JSON request,
    runs 5-LLM consensus, returns structured JSON response matching
    the contract defined in consensuspress_mock_api.yaml.

    Currently the Seekrates engine uses web form + email delivery.
    The API endpoint replaces this with JSON request/response.

  depends_on:
    - "BUG-105-01 deployed (consensus_engine v5.1.0 with refusal detection)"
