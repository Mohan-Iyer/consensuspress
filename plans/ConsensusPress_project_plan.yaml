# =============================================================================
# SECTION 2: PHP METHODOLOGY TOOLING (Phase 0 — NEW)
# =============================================================================
# These tools do not exist. They must be built BEFORE feature sprints resume.
# All tools are REUSABLE across future WordPress plugins.
# =============================================================================
phase_0_tooling:

  principle: |
    The Python AFD toolchain (hal001_scanner.py, inventory_file.py,
    diff_inventories.py, spec_lint.py) cannot parse PHP. PHP has no
    Pydantic, no TypedDict, no ast module for PHP parsing.

    We need PHP-native equivalents that enforce the same Four Ills
    defences using PHP's available type system (PHPDoc, type hints,
    static analysis). These are standalone CLI tools that run on
    Mohan's machine — NOT part of the WordPress plugin.

    Design constraint: reusable across ALL future PHP/WordPress projects.
    Install once in a shared tools/ directory. Run against any plugin.

  tooling_location:
    canonical: "~/tools/php-afd/"
    symlink_into_projects: "ln -s ~/tools/php-afd consensuspress/tools"
    note: "Same pattern as decision_referee_clean/tools/ for Python projects"

  # ---------------------------------------------------------------------------
  # TOOL 1: hal001_php_scanner.php — ILL-1 DETECTION
  # ---------------------------------------------------------------------------
  tool_1_hal001_scanner:
    file: "tools/php-afd/hal001_php_scanner.php"
    ill: "ILL-1 (Type Erasure)"
    reusable: true
    estimated_loc: 250
    language: "PHP"

    purpose: |
      Scans PHP source files for type erasure violations — the PHP
      equivalents of Python's Dict[str, Any].

    what_it_detects:
      # PHP type erasure patterns (see hallucination_seeds_php.yaml)
      - pattern: "array without PHPDoc @return/@param shape"
        description: "Function returns 'array' with no @return array{key: type} annotation"
        severity: "HIGH"
        grep_preview: 'grep -rn "): array" src/ | grep -v "@return array{"'
      - pattern: "mixed type hint"
        description: "Using 'mixed' as parameter or return type"
        severity: "HIGH"
        grep_preview: 'grep -rn ": mixed" src/'
      - pattern: "Untyped function parameters"
        description: "Function parameter with no type hint and no @param annotation"
        severity: "MEDIUM"
      - pattern: "json_decode without shape assertion"
        description: "json_decode() result used without key validation"
        severity: "HIGH"
      - pattern: "Bare array access on API response"
        description: "$response['key'] without isset() or array_key_exists()"
        severity: "HIGH"

    detection_method: |
      Two-pass approach:
      Pass 1 (token-based): PHP's token_get_all() tokeniser.
        Parses function signatures, return types, parameter types.
        Faster than regex. Handles multi-line signatures correctly.
        Detects: ): array, : mixed, untyped params.
      Pass 2 (pattern-based): Targeted regex on function bodies.
        Detects: json_decode without validation, bare array access,
        $response['key'] without isset().

      Does NOT use nikic/PHP-Parser (external dependency).
      Uses ONLY built-in PHP tokeniser — zero dependencies.

    cli_interface:
      usage: "php tools/php-afd/hal001_php_scanner.php <directory_or_file>"
      exit_codes:
        0: "No violations (or all suppressed)"
        1: "Violations found"
      output_format: |
        FILE: includes/class-consensuspress-api.php
          L147  HAL-001  ): array  query() returns untyped array
          L198  HAL-001  ): array  test_connection() returns untyped array
        ---------------------------------------------------------
        TOTAL: 2 violations in 1 file
        EXIT: 1

    suppression_mechanism: |
      Inline comment: // @hal001-suppress REASON
      Example: // @hal001-suppress External WP function returns mixed
      Suppressed lines reported but do not trigger exit 1.

  # ---------------------------------------------------------------------------
  # TOOL 2: inventory_php.php — ILL-4 PREVENTION
  # ---------------------------------------------------------------------------
  tool_2_inventory_php:
    file: "tools/php-afd/inventory_php.php"
    ill: "ILL-4 (Silent Omission)"
    reusable: true
    estimated_loc: 200
    language: "PHP"

    purpose: |
      Machine-generates function/method inventory for a PHP file.
      Output is YAML suitable for pasting into CCI D0 section.
      Prevents manual enumeration (which LLMs get wrong).

    what_it_inventories:
      - "Functions (function keyword)"
      - "Class methods (public/protected/private)"
      - "Interface methods"
      - "Line numbers"
      - "Visibility (public/protected/private/global)"
      - "Signature hash (first 8 chars of SHA256 of signature string)"

    detection_method: |
      PHP token_get_all() tokeniser.
      Walks token stream for T_FUNCTION tokens.
      Extracts: name, line, visibility, parameter list, return type.
      Generates SHA256 of normalised signature for change detection.

    cli_interface:
      usage: "php tools/php-afd/inventory_php.php <file.php>"
      output: "YAML to stdout — pipe to file or paste into CCI"
      output_format: |
        # inventory_php.php output for class-consensuspress-api.php
        source_file: "includes/class-consensuspress-api.php"
        inventory_date: "2026-02-28"
        inventory_sha256: "a78f5..."
        function_count: 5
        functions:
          - name: "post"
            line: 55
            kind: "method"
            visibility: "public"
            class: "ConsensusPress_WP_Transport"
            signature_hash: "79fdb77d"
            must_preserve: true

  # ---------------------------------------------------------------------------
  # TOOL 3: diff_inventories_php.php — ILL-4 ENFORCEMENT
  # ---------------------------------------------------------------------------
  tool_3_diff_inventories:
    file: "tools/php-afd/diff_inventories_php.php"
    ill: "ILL-4 (Silent Omission)"
    reusable: true
    estimated_loc: 150
    language: "PHP"

    purpose: |
      Compares D0 preservation contract (from CCI YAML) against delivered
      PHP file's actual function inventory. Reports missing functions.
      D-C QC Gate 3 Step 2 — machine-enforced.

    cli_interface:
      usage: "php tools/php-afd/diff_inventories_php.php --cci CCI.yaml --output file.php"
      exit_codes:
        0: "All must_preserve functions present in output"
        1: "One or more functions missing — delivery rejected"

    depends_on: "inventory_php.php (reuses inventory logic)"

  # ---------------------------------------------------------------------------
  # TOOL 4: spec_lint_php.php — ALL ILLS GATE
  # ---------------------------------------------------------------------------
  tool_4_spec_lint:
    file: "tools/php-afd/spec_lint_php.php"
    ill: "ALL (ILL-1 through ILL-4)"
    reusable: true
    estimated_loc: 300
    language: "PHP (parses YAML CCIs)"

    purpose: |
      Validates CCI YAML before D-C hands it to C-C.
      Equivalent of Python's spec_lint.py — adapted for PHP CCIs.

    what_it_checks:
      - section: "D0"
        check: "Preservation contract present and machine-sourced"
        ill: "ILL-4"
      - section: "D1"
        check: "All array boundaries documented with PHPDoc shapes or DEFERRED"
        ill: "ILL-1"
      - section: "D2"
        check: "balance_check is BALANCED, not PENDING"
        ill: "ILL-2"
      - section: "D3"
        check: "Format contracts present when external_api_calls: true"
        ill: "ILL-3"
      - section: "Identity"
        check: "instruction_id, session, template_version present"
        ill: "Process"
      - section: "D4"
        check: "Test scenarios listed with IDs"
        ill: "Process"

    cli_interface:
      usage: "php tools/php-afd/spec_lint_php.php path/to/CCI.yaml"
      exit_codes:
        0: "PASS — CCI may be issued to C-C"
        1: "FAIL — return to D-C for correction"

    dependency: "Requires a YAML parser — symfony/yaml (composer) or built-in yaml_parse"

  # ---------------------------------------------------------------------------
  # TOOL 5: wp_compliance_scanner.php — WORDPRESS-SPECIFIC
  # ---------------------------------------------------------------------------
  tool_5_wp_compliance:
    file: "tools/php-afd/wp_compliance_scanner.php"
    ill: "WordPress.org submission gate"
    reusable: true
    estimated_loc: 200
    language: "PHP"

    purpose: |
      Scans PHP files for WordPress.org compliance violations.
      These are the patterns WordPress.org reviewers check and reject on.
      Running this before submission saves weeks of review ping-pong.

    what_it_detects:
      - id: "HAL-WP-001"
        name: "Missing input sanitization"
        pattern: "$_POST, $_GET, $_REQUEST without sanitize_*"
        severity: "CRITICAL"
      - id: "HAL-WP-002"
        name: "Missing output escaping"
        pattern: "echo/print without esc_html/esc_attr/esc_url"
        severity: "CRITICAL"
      - id: "HAL-WP-003"
        name: "Missing nonce verification"
        pattern: "wp_ajax_ handler without check_ajax_referer/wp_verify_nonce"
        severity: "CRITICAL"
      - id: "HAL-WP-004"
        name: "Missing capability check"
        pattern: "admin action without current_user_can()"
        severity: "HIGH"
      - id: "HAL-WP-005"
        name: "Inline JS/CSS"
        pattern: "<script>/<style> tags in PHP templates"
        severity: "MEDIUM"
      - id: "HAL-WP-006"
        name: "Direct file access"
        pattern: "PHP file without ABSPATH check"
        severity: "HIGH"
      - id: "HAL-WP-007"
        name: "Hardcoded paths/URLs"
        pattern: "Absolute paths instead of plugin_dir_path() etc."
        severity: "MEDIUM"
      - id: "HAL-WP-008"
        name: "Direct database queries"
        pattern: "$wpdb->query() without prepare()"
        severity: "CRITICAL"

    cli_interface:
      usage: "php tools/php-afd/wp_compliance_scanner.php <directory>"
      exit_codes:
        0: "No violations"
        1: "Violations found"

  # ---------------------------------------------------------------------------
  # TOOL 6: validate_all_php.sh — MASTER GATE
  # ---------------------------------------------------------------------------
  tool_6_validate_all:
    file: "tools/php-afd/validate_all_php.sh"
    ill: "ALL"
    reusable: true
    estimated_loc: 80
    language: "Bash"

    purpose: |
      Runs ALL scanners in sequence. Single command, single pass/fail.
      This is what C-C runs before delivery. This is what D-C runs at QC.

    sequence:
      - step: 1
        tool: "hal001_php_scanner.php"
        gate: "exit 0 required"
      - step: 2
        tool: "wp_compliance_scanner.php"
        gate: "exit 0 required"
      - step: 3
        tool: "phpunit"
        gate: "all tests pass"
      - step: 4
        tool: "php -l (syntax check)"
        gate: "no parse errors"

    cli_interface:
      usage: "bash tools/php-afd/validate_all_php.sh <plugin_directory>"
      exit_codes:
        0: "ALL gates passed"
        1: "One or more gates failed — report shows which"

  # ---------------------------------------------------------------------------
  # TOOLING SUMMARY
  # ---------------------------------------------------------------------------
  tooling_summary:
    total_tools: 6
    total_estimated_loc: "~1,180"
    language: "PHP (5) + Bash (1)"
    external_dependencies: "symfony/yaml OR ext-yaml for YAML parsing in spec_lint"
    session_estimate: "1-2 sessions (D-C design + C-C implementation)"
    reusable_across: "All future WordPress/PHP plugins"

    build_order:
      - tool: "hal001_php_scanner.php"
        reason: "ILL-1 is most prevalent. Scanner output drives everything else."
        priority: "P0"
      - tool: "inventory_php.php"
        reason: "Required for D0 preservation contracts in all CCIs."
        priority: "P0"
      - tool: "wp_compliance_scanner.php"
        reason: "WordPress-specific. Catches submission blockers early."
        priority: "P0"
      - tool: "diff_inventories_php.php"
        reason: "Required for D-C QC Gate 3 Step 2."
        priority: "P1"
      - tool: "spec_lint_php.php"
        reason: "CCI validation. Can be deferred until first CCI issued."
        priority: "P1"
      - tool: "validate_all_php.sh"
        reason: "Orchestrator. Build after individual tools exist."
        priority: "P2"

# =============================================================================
# SECTION 3: FOUR ILLS BASELINE (Phase 0.5)
# =============================================================================
phase_0_5_four_ills_baseline:

  trigger: "Phase 0 tooling complete (hal001_php_scanner + inventory_php exist)"
  session_estimate: "0.5 sessions (runs during same session as tooling delivery)"

  procedure:
    step_1:
      action: "Run hal001_php_scanner.php against Sprint 1 codebase"
      command: "php tools/php-afd/hal001_php_scanner.php consensuspress/"
      expected: |
        Sprint 1 has known ILL-1 violations:
        - query() returns array (untyped inner structure)
        - test_connection() returns array (untyped)
        - get_usage() returns array (untyped)
        - consensuspress_activate() sets options without shape contract
        Scanner will quantify the exact count.

    step_2:
      action: "Run wp_compliance_scanner.php against Sprint 1 codebase"
      command: "php tools/php-afd/wp_compliance_scanner.php consensuspress/"
      expected: "Sprint 1 was manually verified — scanner should confirm 0 violations"

    step_3:
      action: "Run inventory_php.php on each production file"
      command: |
        php tools/php-afd/inventory_php.php consensuspress/consensuspress.php
        php tools/php-afd/inventory_php.php consensuspress/includes/class-consensuspress-api.php
        php tools/php-afd/inventory_php.php consensuspress/includes/class-consensuspress-settings.php
      output: "Machine-generated D0 inventories for each file"

    step_4:
      action: "Produce baseline document"
      file: "bootstrap/consensuspress_hal001_baseline_cp01.yaml"
      content: |
        Records: total violations, file list, classification (REAL/FALSE_POSITIVE),
        fix plan (IN-SPRINT vs DEFERRED with TYPE-A/B/C).

    step_5:
      action: "Fix ILL-1 violations in Sprint 1 files"
      method: |
        Add PHPDoc @return array{success: bool, data: array|null, ...} annotations.
        Add runtime key validation functions for API response consumption.
        Issue as CCI-CP-03-01 (first ConsensusPress CCI under Four Ills protocol).

  outcome: |
    After Phase 0.5: ConsensusPress Sprint 1 is Four Ills compliant.
    Baseline established. All future sprints operate under full CCI protocol.

