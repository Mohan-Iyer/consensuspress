# =============================================================================
# SECTION 9: RISK REGISTER
# =============================================================================
risks:

  R-CP-001:
    risk: "PHP has no TypedDict equivalent — ILL-1 defence is weaker than Python"
    mitigation: |
      PHPDoc array shapes (@return array{key: type}) provide documentation-level typing.
      PHPStan/Psalm can enforce these statically. Runtime validation functions provide
      execution-level enforcement. Combined: weaker than Pydantic but stronger than nothing.
    severity: "HIGH"
    status: "Accepted — mitigations designed into tooling"

  R-CP-002:
    risk: "Token-based PHP scanner may miss edge cases that AST-based Python scanner catches"
    mitigation: |
      PHP's token_get_all() is more limited than Python's ast module.
      Supplemented with targeted regex patterns. Test suite includes
      edge cases (multi-line signatures, heredoc, nowdoc, nested functions).
    severity: "MEDIUM"
    status: "Accepted — test coverage compensates"

  R-CP-003:
    risk: "Railway API endpoint not built — blocks live testing"
    mitigation: "Mock API decouples plugin development. Endpoint built in parallel (Session 10)."
    severity: "MEDIUM"
    status: "Mitigated by architecture (transport injection)"

  R-CP-004:
    risk: "WordPress.org review process is slow (weeks) and unpredictable"
    mitigation: |
      wp_compliance_scanner catches known rejection patterns.
      readme.txt follows exact WordPress.org format.
      Plugin Handbook requirements checked before submission.
    severity: "LOW"
    status: "Accepted — scanner reduces risk"

  R-CP-005:
    risk: "Sprint 1 ILL-1 violations compound into Sprint 2"
    mitigation: "Phase 0.5 fixes Sprint 1 before Sprint 2 begins."
    severity: "HIGH"
    status: "Mitigated by project plan sequence"

