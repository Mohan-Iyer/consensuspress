# =============================================================================
# CONSENSUSPRESS MOCK API SPECIFICATION v2.0.0
# =============================================================================
# File:     docs/consensuspress_mock_api.yaml
# Version:  2.0.0  (Sprint 7 — HAL-008 resolution)
# Previous: 1.0.0  (Session 03, Sprint 1 — assumed server returns content_html etc.)
# Author:   C-C (Session 09, Sprint 7)
# Spec:     docs/sprint_7_D1_d7_instructions.yaml D5 mock_api_updates
#
# BREAKING CHANGES v1.0.0 → v2.0.0:
#   REMOVED top-level fields that do NOT exist in real engine output:
#     - content_html          (generated by plugin PHP pipeline)
#     - metadata.*            (generated by plugin PHP pipeline)
#     - schema_markup.*       (generated by plugin PHP pipeline)
#     - featured_image.url    (Unsplash — deferred Sprint 8)
#     - consensus_reached     → data.consensus.reached
#     - consensus_score       → data.consensus.convergence_percentage
#     - agreement_level       → data.consensus.consensus_confidence
#     - champion.provider     → data.consensus.champion (string, not object)
#     - champion.response_text→ data.providers[where provider==champion].answer
#     - synthesis             → data.consensus.consensus_text
#     - oracle_risk           → data.risk_analysis (null for seeker/acolyte)
#     - individual_responses[]→ data.providers[]
#     - points_of_agreement[] → data.divergence.common_themes[]
#     - points_of_divergence[]→ data.divergence.outliers[]
#
#   ADDED: Real ConsensusResult.model_dump() field structure + query + mode
#          injected by endpoint (D-08-08).
# =============================================================================

version: "2.0.0"

# =============================================================================
# ENDPOINT CONTRACT
# =============================================================================
endpoint:
  method: "POST"
  path:   "/api/v1/consensus"
  auth:   "Bearer {session_token}"
  timeout_seconds: 120

request_body:
  query:   "string (min 10 chars)"
  mode:    "'create' | 'rescue'"
  context: "string (optional, max 2000 chars)"

# =============================================================================
# RESPONSE ENVELOPE
# =============================================================================
response_envelope:
  success_shape: |
    {
      "success": true,
      "data":    { ...ConsensusResult.model_dump() + "query" + "mode" }
    }

  error_shape: |
    {
      "success": false,
      "error":   { "code": str, "message": str }
    }

  tc_gate_shape: |
    HTTP 200 — NOT a success response.
    {
      "status":  "needs_tc_acceptance",
      "message": str,
      "tc_url":  str
    }

# =============================================================================
# DATA FIELD MAP (ConsensusResult.model_dump() + injected fields)
# =============================================================================
data_fields:
  injected_by_endpoint:
    - query:  "string — original request query (NOT in Pydantic model, injected by endpoint)"
    - mode:   "string — 'create' | 'rescue' (injected by endpoint)"

  from_consensus_object:
    - "consensus.champion:               string  — winning provider name e.g. 'openai'"
    - "consensus.champion_score:         int     — quality score 0–100"
    - "consensus.convergence_percentage: float   — agreement % 0–100"
    - "consensus.consensus_confidence:   string  — 'HIGH' | 'MODERATE' | 'LOW'"
    - "consensus.reached:                bool"
    - "consensus.agreement_percentage:   float   — alias of convergence_percentage"
    - "consensus.consensus_text:         string  — plain text synthesis"
    - "consensus.consensus_panel:        string  — HTML panel (NOT used for blog)"
    - "consensus.divergence_highlight:   string"
    - "consensus.dissenting_provider:    string"

  from_providers_array:
    - "providers[].provider:   string  — provider name"
    - "providers[].answer:     string  — raw LLM response text"
    - "providers[].score:      int     — quality score 0–100"
    - "providers[].confidence: float   — 0.0–1.0"
    - "providers[].is_refusal: bool"
    - "providers[].status:     string  — 'success' | 'error' | 'refusal'"

  from_divergence_object:
    - "divergence.common_themes[]:   list<string>  — points_of_agreement equivalent"
    - "divergence.outliers[]:        list<string>  — points_of_divergence equivalent"
    - "divergence.personality_quotes: array"
    - "divergence.article_hook:      string"
    - "divergence.theme_coverage:    array"

  from_risk_analysis_object_nullable:
    note: "null for seeker and acolyte tiers; populated for oracle and sage"
    - "risk_analysis.assumptions[]:           list<string>"
    - "risk_analysis.failure_modes[]:         list<string>"
    - "risk_analysis.contrarian_argument:     string"
    - "risk_analysis.contrarian_significance: string"
    - "risk_analysis.contrarian_reasoning:    string"
    - "risk_analysis.oracle_recommendation:   string"
    - "risk_analysis.validation_checklist[]:  list<string>"

  top_level_metadata:
    - "correlation_id: string  — UUID for tracing"
    - "tier:           string  — 'seeker' | 'acolyte' | 'oracle' | 'sage'"

# =============================================================================
# FIXTURES
# =============================================================================
