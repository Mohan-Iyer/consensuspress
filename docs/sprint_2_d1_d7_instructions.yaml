# =============================================================================
# D3: CONTRACT MAP (OUTPUT/INPUT BALANCE)
# =============================================================================
d3_contracts:

  # Create page form → AJAX handler
  contract_1:
    output:
      producer: "admin/views/create.php + admin/js/consensuspress-create.js"
      data: "{ action: 'consensuspress_create_post', nonce, topic, context }"
    input:
      consumer: "consensuspress_ajax_create_post() in consensuspress.php"
      reads: "$_POST['topic'], $_POST['context'], nonce"
    balance: "VERIFIED"

  # AJAX handler → API client
  contract_2:
    output:
      producer: "consensuspress_ajax_create_post()"
      data: "$api->query( $topic, 'create', $context )"
    input:
      consumer: "ConsensusPress_API::query() (Sprint 1 — unchanged)"
      reads: "string $query, string $mode, string $context"
    balance: "VERIFIED — Sprint 1 signatures match"

  # API client → Post Builder
  contract_3:
    output:
      producer: "ConsensusPress_API::query() returns array{success, data, error, http_status}"
      data: "$result['data'] (full consensus response)"
    input:
      consumer: "ConsensusPress_Post_Builder::create_draft( array $api_data, string $mode )"
      reads: "13 top-level keys from api_data (see D1 PHPDoc shape)"
    balance: "VERIFIED — api_data shape matches mock_api.yaml response_success schema"

  # Post Builder → WordPress
  contract_4:
    output:
      producer: "ConsensusPress_Post_Builder::create_draft()"
      data: "wp_insert_post args, update_post_meta calls, media_sideload_image"
    input:
      consumer: "WordPress core functions"
      reads: "Standard WP function signatures"
    balance: "VERIFIED — all WP functions are core API"

  # AJAX handler → JS
  contract_5:
    output:
      producer: "consensuspress_ajax_create_post() via wp_send_json_success()"
      data: "{ success: true, post_id: int, edit_url: string, message: string }"
    input:
      consumer: "admin/js/consensuspress-create.js success callback"
      reads: "response.data.post_id, response.data.edit_url, response.data.message"
    balance: "VERIFIED"

  # Consensus meta → Meta box (Sprint 3, forward contract)
  contract_6:
    output:
      producer: "ConsensusPress_Post_Builder::inject_consensus_meta()"
      data: "6 post_meta keys (CONSENSUS_META_KEYS)"
    input:
      consumer: "Sprint 3 meta box (reads these keys on post edit screen)"
      reads: "_consensuspress_score, _mode, _champion_provider, _agreement_level, _oracle_risk_level, _created_at"
    balance: "FORWARD CONTRACT — Sprint 3 must read exactly these keys"

