# =============================================================================
# SPRINT 1 SCOPE
# =============================================================================
scope:
  in_scope:
    - "consensuspress.php (main plugin file — header, activation, hooks)"
    - "includes/class-consensuspress-api.php (API client with transport injection)"
    - "includes/class-consensuspress-settings.php (Settings API registration + page)"
    - "admin/views/settings.php (settings page template)"
    - "admin/css/consensuspress-admin.css (scaffold styles only)"
    - "admin/js/consensuspress-admin.js (scaffold — API key test button)"
    - "readme.txt (WordPress.org listing)"
