  note: "C-C writes standard WordPress.org readme content. Keep descriptions factual. No marketing hyperbole."

# =============================================================================
# CSS SCAFFOLD SPEC (minimal — design kit comes later)
# =============================================================================
css_scaffold:
  file: "admin/css/consensuspress-admin.css"
  contents: |
    /* Layout only — design kit applied later */
    .consensuspress-wrap { max-width: 800px; padding: 20px 0; }
    .consensuspress-wrap h1 { margin-bottom: 20px; }
    .consensuspress-wrap .form-table th { width: 200px; }
    #consensuspress-test-connection { margin-left: 10px; }
    #consensuspress-connection-result { margin-left: 10px; font-style: italic; }
    #consensuspress-connection-result.success { color: #46b450; }
    #consensuspress-connection-result.error { color: #dc3232; }

# =============================================================================
# JS SPEC (Test Connection button only)
# =============================================================================
js_spec:
  file: "admin/js/consensuspress-admin.js"
  logic: |
    jQuery(document).ready(function($) {
        $('#consensuspress-test-connection').on('click', function() {
            var $button = $(this);
            var $result = $('#consensuspress-connection-result');
            
            $button.prop('disabled', true).text('Testing...');
            $result.text('').removeClass('success error');
            
            $.ajax({
                url: consensuspress_ajax.ajax_url,
                type: 'POST',
                data: {
                    action: 'consensuspress_test_connection',
                    nonce: consensuspress_ajax.nonce
                },
                success: function(response) {
                    if (response.success) {
                        $result.text(response.data.message).addClass('success');
                    } else {
                        $result.text(response.data.message).addClass('error');
                    }
                },
                error: function() {
                    $result.text('Request failed').addClass('error');
                },
                complete: function() {
                    $button.prop('disabled', false).text('Test Connection');
                }
            });
        });
    });

# =============================================================================
# SETTINGS PAGE TEMPLATE SPEC
# =============================================================================
settings_template_spec:
  file: "admin/views/settings.php"
  structure: |
    1. ABSPATH check (security)
    2. <div class="wrap consensuspress-wrap">
    3. <h1>ConsensusPress Settings</h1>
    4. Usage display: "Used X of Y this month (tier)" — read from options
    5. <form method="post" action="options.php">
    6.   settings_fields('consensuspress_settings')
    7.   do_settings_sections('consensuspress')
    8.   submit_button()
    9. </form>
    10. </div>
  usage_display: |
    <?php
    $used  = absint( get_option( 'consensuspress_usage_count', 0 ) );
    $limit = absint( get_option( 'consensuspress_usage_limit', 3 ) );
    $tier  = esc_html( get_option( 'consensuspress_tier', 'free' ) );
    ?>
    <div class="consensuspress-usage">
        <p><?php printf( 'Usage: %d of %d this month (%s tier)', $used, $limit, $tier ); ?></p>
    </div>

