        rationale: "Loaded on plugins_loaded, not on every page load"
      - statement: "require_once CONSENSUSPRESS_PLUGIN_DIR . 'includes/class-consensuspress-settings.php';"
        location: "inside consensuspress_init() function"
        rationale: "Settings class needed for admin hooks"
    hooks:
      - statement: "register_activation_hook( __FILE__, 'consensuspress_activate' );"
        priority: "n/a (WordPress core manages activation)"
      - statement: "register_deactivation_hook( __FILE__, 'consensuspress_deactivate' );"
        priority: "n/a"
      - statement: "add_action( 'plugins_loaded', 'consensuspress_init' );"
        priority: 10
      - statement: "add_action( 'wp_ajax_consensuspress_test_connection', 'consensuspress_ajax_test_connection' );"
        priority: 10
    no_autoloader: |
      Sprint 1 has only 2 class files — require_once is appropriate.
      PSR-4 autoloader added in Sprint 2 when class count grows.

  class_consensuspress_api_php:
    file: "includes/class-consensuspress-api.php"
    contains:
      - "ConsensusPress_Transport_Interface (interface)"
      - "ConsensusPress_WP_Transport (class)"
