    consumed_by: "test-api-client.php"

# =============================================================================
# D7: TEST INFRASTRUCTURE
# =============================================================================
d7_test_infrastructure:

  bootstrap:
    file: "tests/bootstrap.php"
    content_spec: |
      <?php
      /**
       * PHPUnit bootstrap for ConsensusPress tests.
       *
       * @package ConsensusPress
       */
      
      // Define ABSPATH if not in WP test environment.
      if ( ! defined( 'ABSPATH' ) ) {
          define( 'ABSPATH', '/tmp/wordpress/' );
      }
      
      // Stub WordPress functions for standalone testing.
      if ( ! function_exists( 'get_option' ) ) {
          // Simulated options store.
          global $consensuspress_test_options;
          $consensuspress_test_options = array();
          
          function get_option( $key, $default = false ) {
              global $consensuspress_test_options;
              return isset( $consensuspress_test_options[ $key ] )
                  ? $consensuspress_test_options[ $key ]
                  : $default;
          }
          
          function update_option( $key, $value ) {
              global $consensuspress_test_options;
              $consensuspress_test_options[ $key ] = $value;
              return true;
          }
          
          function add_option( $key, $value = '' ) {
              global $consensuspress_test_options;
              if ( ! isset( $consensuspress_test_options[ $key ] ) ) {
                  $consensuspress_test_options[ $key ] = $value;
              }
              return true;
          }
          
          function delete_option( $key ) {
              global $consensuspress_test_options;
              unset( $consensuspress_test_options[ $key ] );
              return true;
          }
          
          function wp_json_encode( $data ) {
              return json_encode( $data );
          }
          
          function wp_remote_retrieve_response_code( $response ) {
              return isset( $response['response']['code'] )
                  ? $response['response']['code']
                  : 0;
          }
          
          function wp_remote_retrieve_body( $response ) {
              return isset( $response['body'] ) ? $response['body'] : '';
          }
          
          function is_wp_error( $thing ) {
              return $thing instanceof WP_Error;
          }
          
          function sanitize_text_field( $str ) {
              return trim( strip_tags( $str ) );
          }
          
          function sanitize_email( $email ) {
              return filter_var( $email, FILTER_SANITIZE_EMAIL );
          }
          
          function absint( $val ) {
              return abs( (int) $val );
          }
          
          /**
           * Minimal WP_Error stub for testing.
           */
          class WP_Error {
              private $code;
              private $message;
              
              public function __construct( $code = '', $message = '' ) {
                  $this->code    = $code;
                  $this->message = $message;
              }
              
              public function get_error_code() {
                  return $this->code;
              }
              
              public function get_error_message() {
                  return $this->message;
              }
          }
      }
      
      // Define plugin constants.
      if ( ! defined( 'CONSENSUSPRESS_VERSION' ) ) {
          define( 'CONSENSUSPRESS_VERSION', '1.0.0' );
      }
      if ( ! defined( 'CONSENSUSPRESS_API_ENDPOINT' ) ) {
          define( 'CONSENSUSPRESS_API_ENDPOINT', 'https://app.seekrates-ai.com/api/v1/consensus' );
      }
      if ( ! defined( 'CONSENSUSPRESS_API_TIMEOUT' ) ) {
          define( 'CONSENSUSPRESS_API_TIMEOUT', 120 );
      }
      
      // Load plugin files.
      require_once __DIR__ . '/class-consensuspress-mock-transport.php';
      require_once __DIR__ . '/../includes/class-consensuspress-api.php';
      require_once __DIR__ . '/../includes/class-consensuspress-settings.php';

  mock_transport:
    file: "tests/class-consensuspress-mock-transport.php"
    content_spec: |
      <?php
      /**
       * Mock HTTP transport for testing.
       *
       * @package ConsensusPress
       */
      
      /**
       * Mock transport that returns predetermined responses.
       * Implements ConsensusPress_Transport_Interface.
       */
      class ConsensusPress_Mock_Transport implements ConsensusPress_Transport_Interface {
      
          /** @var string JSON response body. */
          private $response_json;
      
          /** @var int HTTP status code. */
          private $http_status;
      
          /** @var bool Whether to return WP_Error instead. */
          private $simulate_error;
      
          /** @var string Error message when simulating error. */
          private $error_message;
      
          /**
           * Constructor.
           *
           * @param string $response_json JSON response body.
           * @param int    $http_status   HTTP status code (default 200).
           * @param bool   $simulate_error Return WP_Error instead of response.
           * @param string $error_message Error message for WP_Error.
           */
          public function __construct(
              string $response_json = '{}',
              int $http_status = 200,
              bool $simulate_error = false,
              string $error_message = 'Connection failed'
          ) {
              $this->response_json  = $response_json;
              $this->http_status    = $http_status;
              $this->simulate_error = $simulate_error;
              $this->error_message  = $error_message;
          }
      
          /**
           * Simulate HTTP POST.
           *
           * @param string $url  Endpoint URL.
           * @param array  $args Request arguments.
           * @return array|WP_Error Response or error.
           */
          public function post( string $url, array $args ) {
              if ( $this->simulate_error ) {
                  return new WP_Error( 'http_request_failed', $this->error_message );
              }
      
              return array(
                  'response' => array(
                      'code'    => $this->http_status,
                      'message' => 'OK',
                  ),
                  'body'     => $this->response_json,
              );
          }
      }

  fixtures_location: "Defined in consensuspress_mock_api.yaml. C-C copies fixture JSON verbatim into test methods."

  phpunit_config: |
    File: phpunit.xml (in plugin root)
    
    <?xml version="1.0"?>
    <phpunit
        bootstrap="tests/bootstrap.php"
        colors="true"
        verbose="true"
        stopOnFailure="false">
        <testsuites>
            <testsuite name="ConsensusPress">
                <directory>tests</directory>
            </testsuite>
        </testsuites>
    </phpunit>

