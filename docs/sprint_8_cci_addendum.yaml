# -----------------------------------------------------------------------------
# ITEM 1: deploy_to_wp_org.sh gate reorder (v1.0.0 → v1.0.1)
# -----------------------------------------------------------------------------
deploy_script_correction:
  file: deploy_to_wp_org.sh
  version_from: 1.0.0
  version_to: 1.0.1
  reason: >
    v1.0.0 gate sequence was: PHPUnit → Version consistency → HAL-001 →
    WP compliance → readme.txt (standalone Gate 5).
    Locked spec sequence is: PHPUnit → WP compliance → Version consistency →
    HAL-001 → [dry-run exit] → SVN.
    Rationale: structural gates (compliance, readme) should surface real problems
    before the version check short-circuits. readme.txt validation is folded
    into Gate 2 (WP compliance) — not a standalone gate.
  changes:
    - Gate 2 is now WP compliance (was version consistency). Includes readme.txt
      presence check and required-sections check as sub-steps 2a/2b/2c.
    - Gate 3 is now version consistency (was HAL-001).
    - Gate 4 is now HAL-001 (was WP compliance).
    - Standalone Gate 5 removed (readme.txt folded into Gate 2).
    - --dry-run exits after Gate 4 (4 gates, not 5).
    - Gate numbering in DNA header corrected.
  status: DELIVERED — deploy_to_wp_org.sh v1.0.1 in outputs/

# -----------------------------------------------------------------------------
# ITEM 2: B-119-01 — Railway smoke test blocker
# -----------------------------------------------------------------------------
blocker:
  id: B-119-01
  priority: HIGH
  title: Railway smoke test blocked — seekrates_ai deploy script not yet run
  status: OPEN

  background: >
    Sprint 7 delivered consensuspress_endpoints.py v1.0.1 which corrected
    the route from /api/v1/consensus to /api/v1/cp/consensus (D-12-ROUTE).
    This file must be deployed to the Railway seekrates_ai server before
    the plugin can successfully call the consensus endpoint.
    The seekrates_ai production codebase is a hard boundary — ConsensusPress
    does not touch it. The deploy script for that server is Mohan's manual
    handoff (D-12-BOUNDARY).

  c_c_constraint: |
    ⚠️  C-C MUST READ THIS BEFORE EXECUTING ANY SMOKE TEST STEP.

    The smoke test gate — real API key → real topic → real Railway endpoint
    → real WordPress draft — CANNOT pass until B-119-01 is cleared.

    B-119-01 is cleared ONLY when Mohan confirms:
      (a) seekrates_ai deploy script has been run on Railway, AND
      (b) POST /api/v1/cp/consensus returns 200 on a test curl

    C-C MUST NOT:
      - Attempt the end-to-end smoke test before B-119-01 is cleared
      - Treat absence of a green smoke test as a Sprint 8 failure
      - Modify any file in the seekrates_ai server codebase
      - Invent a workaround that bypasses the Railway endpoint

    C-C MUST:
      - Complete all plugin packaging work (Phases 1-3) independently
      - Flag B-119-01 status in the session summary
      - Await Mohan confirmation before attempting smoke test

  unblocking_steps:
    - Mohan runs seekrates_ai deploy script on Railway
    - Confirm endpoint live: >
        curl -X POST https://app.seekrates-ai.com/api/v1/cp/consensus \
          -H "Authorization: Bearer <key>" \
          -H "Content-Type: application/json" \
          -d '{"topic":"test","user_id":"test"}'
    - Expect: HTTP 200 with consensus JSON payload
    - Once confirmed: B-119-01 CLOSED, smoke test gate unblocked

  impact_on_sprint_8: >
    Sprint 8 plugin packaging work (Unsplash integration, PHP 8.5 housekeeping,
    WP.org deploy script) is fully executable and does not touch Railway.
    Sprint 8 is COMPLETE when PHPUnit is green (70/70 target) and deploy
    dry-run passes all 4 gates. Smoke test is post-sprint validation,
    not a Sprint 8 deliverable gate.