          - "Initial release — plugin skeleton, settings, API client"

  # ---------------------------------------------------------------------------
  # PART C: deploy_to_wp_org.sh
  # ---------------------------------------------------------------------------
  deploy_script:
    file: "deploy_to_wp_org.sh"
    status: "NEW FILE — at ConsensusPress repo root"
    shebang: "#!/bin/bash"
    set_flags: "set -e"
    dry_run_note: |
      Supports --dry-run flag. Run as:
        ./deploy_to_wp_org.sh            → full deploy including SVN commit
        ./deploy_to_wp_org.sh --dry-run  → all gates, stops before SVN commit
    structure: |
      #!/bin/bash
      set -e

      DRY_RUN=false
      if [ "${1}" = "--dry-run" ]; then
        DRY_RUN=true
        echo "🔍 DRY RUN MODE — gates will run but SVN commit will not."
        echo ""
      fi

      # -----------------------------------------------------------------------
      # Gate 1: PHPUnit
      # -----------------------------------------------------------------------
      echo "Gate 1: PHPUnit..."
      cd plugin/consensuspress
      vendor/bin/phpunit --configuration ../../tests/phpunit.xml
      if [ $? -ne 0 ]; then
        echo "❌ GATE 1 FAILED: PHPUnit tests not green. Aborting."
        exit 1
      fi
      cd ../..
      echo "✅ Gate 1 passed: PHPUnit"

      # -----------------------------------------------------------------------
      # Gate 2: WP compliance scanner
      # -----------------------------------------------------------------------
      echo "Gate 2: WP compliance scanner..."
      php docs/tooling/php-afd/wp_compliance_scanner.php plugin/consensuspress/
      if [ $? -ne 0 ]; then
        echo "❌ GATE 2 FAILED: WP compliance violations found. Aborting."
        exit 1
      fi
      echo "✅ Gate 2 passed: WP compliance scanner"

      # -----------------------------------------------------------------------
      # Gate 3: Version consistency check
      # Stable tag in readme.txt MUST match Version in consensuspress.php header.
      # WP.org rejects submissions where these differ.
      # -----------------------------------------------------------------------
      echo "Gate 3: Version consistency check..."
      STABLE_TAG=$(grep "Stable tag:" plugin/consensuspress/readme.txt | sed 's/Stable tag: *//' | tr -d '[:space:]')
      PLUGIN_VER=$(grep "^ \* Version:" plugin/consensuspress/consensuspress.php | sed 's/ \* Version: *//' | tr -d '[:space:]')
      if [ -z "$STABLE_TAG" ]; then
        echo "❌ GATE 3 FAILED: Could not read Stable tag from readme.txt. Aborting."
        exit 1
      fi
      if [ -z "$PLUGIN_VER" ]; then
        echo "❌ GATE 3 FAILED: Could not read Version from consensuspress.php. Aborting."
        exit 1
      fi
      if [ "$STABLE_TAG" != "$PLUGIN_VER" ]; then
        echo "❌ GATE 3 FAILED: Version mismatch."
        echo "   readme.txt Stable tag : $STABLE_TAG"
        echo "   consensuspress.php Ver: $PLUGIN_VER"
        echo "   These must be identical. Aborting."
        exit 1
      fi
      echo "✅ Gate 3 passed: Version consistency ($STABLE_TAG)"

      # -----------------------------------------------------------------------
      # Gate 4: HAL-001 PHP scanner (Fracture-Free gate)
      # -----------------------------------------------------------------------
      echo "Gate 4: HAL-001 scanner..."
