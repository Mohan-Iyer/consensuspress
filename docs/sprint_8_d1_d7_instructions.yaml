        - "Rank Math SEO integration — focus keyword, meta, schema injected automatically"
        - "Create Mode: topic → consensus → WordPress draft"
        - "Rescue Mode: existing post → AI-search restructured → new draft with diff comparison"
        - "3 free posts per month — no credit card required"
      installation_steps:
        - "Upload the consensuspress directory to /wp-content/plugins/"
        - "Activate the plugin through the Plugins menu in WordPress"
        - "Navigate to ConsensusPress > Settings"
        - "Enter your Seekrates AI API key (obtain from app.seekrates-ai.com)"
        - "Optionally enter your Unsplash Access Key for automatic featured images"
        - "Click Save Settings — you are ready to create your first AI-consensus post"
      faq:
        q1:
          q: "Is this an AI writing tool?"
          a: "No. ConsensusPress queries 5 separate LLMs and surfaces consensus across them. The output is validated, hallucination-filtered, and scored — not generated by a single model."
        q2:
          q: "Where do I get an API key?"
