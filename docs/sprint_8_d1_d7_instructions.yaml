# =============================================================================
# D1: TYPE CONTRACTS
# =============================================================================
d1_type_contracts:

  semantic_vocabulary:
    unsplash_key:    "string — Unsplash API Access Key stored in wp_options as consensuspress_unsplash_key"
    unsplash_image:  "array{url: string, alt_text: string, attribution: string} — or empty array on failure"
    keyword:         "string — focus keyword extracted from SEO metadata, used as Unsplash search query"
    unsplash_photo:  "array — decoded JSON from Unsplash API response body"

  php_type_shapes:

    UnsplashImageShape:
      description: "Return shape of fetch_unsplash_image(). Empty array = no image (graceful degrade)."
      fields:
        url:          "string — https://images.unsplash.com/... (esc_url_raw applied)"
        alt_text:     "string — photo description from Unsplash JSON (sanitize_text_field applied)"
        attribution:  "string — 'Photo by {name} on Unsplash' (sanitize_text_field applied)"
      empty_state:    "array() — returned on any failure (no key, API error, WP_Error)"

    UnsplashApiResponse:
      description: "Decoded JSON from GET /photos/random. Only fields we consume are listed."
      consumed_fields:
        urls.regular:           "string — image URL (1080px wide)"
        alt_description:        "string — auto-generated alt text"
        user.name:              "string — photographer display name"
        user.links.html:        "string — photographer profile URL (for attribution link)"

  deferral_register:
    TYPE-B-01:
      field: "fetch_unsplash_image() return — bare array with string keys"
      reason: "Not a Pydantic boundary. PHP. Consumed only by sideload_featured_image() in same class."
      risk: "None — producer and consumer in same file. Shape documented above."

# =============================================================================
# D2: OUTPUT/INPUT CONTRACTS (DOUBLE-ENTRY)
# =============================================================================
d2_contracts:

  contract_unsplash_fetch:
    id: "C8-01"
    debit:
      producer: "ConsensusPress_Post_Builder::fetch_unsplash_image()"
      output: "array{url, alt_text, attribution} or array()"
    credit:
      consumer: "ConsensusPress_Post_Builder::sideload_featured_image()"
      input: "$featured_image array — url, alt_text, attribution keys"
    balance: "BALANCED — both in class-consensuspress-post-builder.php"

  contract_unsplash_key_storage:
    id: "C8-02"
    debit:
      producer: "ConsensusPress_Settings — register_setting + sanitize"
      output: "wp_options key: consensuspress_unsplash_key (string)"
    credit:
      consumer: "ConsensusPress_Post_Builder::fetch_unsplash_image()"
      input: "get_option('consensuspress_unsplash_key', '')"
    balance: "BALANCED — wp_options is the shared contract boundary"

  contract_unsplash_key_activation:
    id: "C8-03"
    debit:
      producer: "consensuspress_activate() — add_option default"
      output: "consensuspress_unsplash_key = '' (empty string default)"
    credit:
      consumer: "ConsensusPress_Settings::render_settings_page() — reads for display"
      input: "get_option('consensuspress_unsplash_key', '')"
    balance: "BALANCED"

  contract_phpunit_gate:
    id: "C8-04"
    debit:
      producer: "tests/test-unsplash.php — 8 test methods"
      output: "8 assertions against fetch_unsplash_image() and settings integration"
    credit:
      consumer: "deploy_to_wp_org.sh — PHPUnit gate step 1"
      input: "vendor/bin/phpunit — must exit 0"
    balance: "BALANCED"

  contract_deploy_script:
    id: "C8-05"
    debit:
      producer: "deploy_to_wp_org.sh"
      output: "Exit 0 only if: PHPUnit green + HAL-001 EXIT 0 + WP compliance EXIT 0"
    credit:
      consumer: "Mohan — manual SVN commit to WordPress.org after script passes"
      input: "Script must exit 0 before SVN commit proceeds"
    balance: "BALANCED — gate enforced by script"

# =============================================================================
# D3: FORMAT CONTRACTS
# =============================================================================
d3_format_contracts:

  unsplash_api_request:
    method: "GET"
    url: "https://api.unsplash.com/photos/random"
    params:
      query:       "string — focus_keyword (URL-encoded via add_query_arg)"
      orientation: "landscape"
      client_id:   "string — consensuspress_unsplash_key from wp_options"
    wp_function: "wp_remote_get() with timeout=15"
    headers:      "none required beyond defaults"

  unsplash_api_response:
    success_code: 200
    body_fields_consumed:
      - "urls.regular        → UnsplashImageShape.url"
      - "alt_description     → UnsplashImageShape.alt_text (fallback: $keyword)"
      - "user.name           → UnsplashImageShape.attribution prefix"
    error_codes:
      401: "Invalid key — return empty array"
      403: "Rate limited — return empty array"
      404: "No photo found — return empty array"
      any_wp_error: "return empty array"

  readme_txt_format:
    standard: "WordPress.org readme.txt format v1.0"
    required_headers:
      - "=== ConsensusPress by Seekrates ==="
      - "Contributors: seekratesai"
      - "Tags: ai content, consensus, seo, llm, content generation"
      - "Requires at least: 6.2"
      - "Tested up to: 6.7"
      - "Requires PHP: 7.4"
      - "Stable tag: 2.1.0"
      - "License: GPLv2 or later"
      - "License URI: https://www.gnu.org/licenses/gpl-2.0.html"
    required_sections:
      - "== Description =="
      - "== Installation =="
      - "== Frequently Asked Questions =="
      - "== Screenshots =="
      - "== Changelog =="
      - "== Upgrade Notice =="

  deploy_script_gates:
    gate_1: "vendor/bin/phpunit --configuration tests/phpunit.xml — exit 0 required"
    gate_2: "php docs/tooling/php-afd/wp_compliance_scanner.php plugin/consensuspress/ — exit 0 required"
    gate_3: |
      VERSION CONSISTENCY CHECK — hard exit if mismatch.
      stable_tag = grep 'Stable tag' plugin/consensuspress/readme.txt
      plugin_ver = grep 'Version:' plugin/consensuspress/consensuspress.php
      Both must match exactly. WP.org rejects submissions where these differ.
    gate_4: "php docs/tooling/php-afd/hal001_php_scanner.php plugin/consensuspress/ — exit 0 required"
    dry_run_exit: "--dry-run flag exits after Gate 4 with ✅ DRY RUN COMPLETE. All gates passed."
    gate_5_svn: "SVN commit — only reached without --dry-run and after all gates pass"
    on_any_failure: "Script exits non-zero with clear message identifying failed gate"
    on_all_pass: "Prints: ✅ ALL GATES PASSED. Plugin ready for WordPress.org SVN submission."

# =============================================================================
# D4: FUNCTION SPECIFICATIONS
# =============================================================================
d4_function_specs:

  # ---------------------------------------------------------------------------
  # PART A: fetch_unsplash_image() — new private method in post-builder
  # ---------------------------------------------------------------------------
  fetch_unsplash_image:
    file: "plugin/consensuspress/includes/class-consensuspress-post-builder.php"
    signature: "private function fetch_unsplash_image( string $keyword ): array"
    purpose: |
      Fetch a relevant image from Unsplash for the post topic.
      Returns UnsplashImageShape array on success, empty array on any failure.
      Called in create_draft() after SEO metadata is generated.
    body_logic: |
      1. $key = get_option( 'consensuspress_unsplash_key', '' )
      2. If empty $key → return array()  (no key configured — graceful skip)
      3. $keyword = sanitize_text_field( $keyword )
      4. If empty $keyword → return array()
      5. $url = add_query_arg( array(
             'query'       => rawurlencode( $keyword ),
             'orientation' => 'landscape',
             'client_id'   => $key,
         ), 'https://api.unsplash.com/photos/random' )
      6. $response = wp_remote_get( $url, array( 'timeout' => 15 ) )
      7. if ( is_wp_error( $response ) ) → return array()
      8. $status = (int) wp_remote_retrieve_response_code( $response )
      9. if ( 200 !== $status ) → return array()
      10. $body = json_decode( wp_remote_retrieve_body( $response ), true )
      11. if ( empty( $body['urls']['regular'] ) ) → return array()
      12. $photo_url   = esc_url_raw( $body['urls']['regular'] )
          $alt_text    = sanitize_text_field( $body['alt_description'] ?? $keyword )
          $author_name = sanitize_text_field( $body['user']['name'] ?? '' )
          $attribution = $author_name
              ? 'Photo by ' . $author_name . ' on Unsplash'
              : 'Photo from Unsplash'
      13. return array(
              'url'         => $photo_url,
              'alt_text'    => $alt_text,
              'attribution' => sanitize_text_field( $attribution ),
          )
    error_handling: "All failures return empty array. Post creation never blocked by image failure."
    phpdoc: |
      /**
       * Fetch a relevant featured image from Unsplash.
       *
       * Requires consensuspress_unsplash_key to be set in wp_options.
       * Returns empty array on any failure — post creation is never blocked.
       *
       * @param string $keyword Focus keyword used as Unsplash search query.
       * @return array{url: string, alt_text: string, attribution: string}|array
       */

  # ---------------------------------------------------------------------------
  # PART A: create_draft() modification — call fetch_unsplash_image()
  # ---------------------------------------------------------------------------
  create_draft_modification:
    file: "plugin/consensuspress/includes/class-consensuspress-post-builder.php"
    method: "create_draft()"
    change: "ADDITIVE — one new call, no existing logic changed"
    insert_location: |
      After: $seo_metadata = $this->generate_seo_metadata( $api_data )
      Before: existing sideload_featured_image() call
    insert_code: |
      // Sprint 8: Fetch Unsplash image using focus keyword.
      $featured_image = $this->fetch_unsplash_image(
          $seo_metadata['focus_keyword'] ?? ''
      );
    note: |
      In Sprint 7, $featured_image was hard-coded to array() (B-08-01 deferral).
      Sprint 8 replaces that empty array with the result of fetch_unsplash_image().
      sideload_featured_image() already handles empty array gracefully — no change needed there.

  # ---------------------------------------------------------------------------
  # PART A: Settings — Unsplash API key field
  # ---------------------------------------------------------------------------
  settings_unsplash_field:
    file: "plugin/consensuspress/includes/class-consensuspress-settings.php"
    modification: "ADD new field — existing fields unchanged"
    new_option_key: "consensuspress_unsplash_key"
    register_setting: |
      register_setting(
          'consensuspress_settings',
          'consensuspress_unsplash_key',
          array( 'sanitize_callback' => 'sanitize_text_field' )
      )
    new_method:
      render_unsplash_key_field:
        signature: "public function render_unsplash_key_field(): void"
        purpose: "Render Unsplash API key input field"
        body_logic: |
          $key = get_option( 'consensuspress_unsplash_key', '' );
          echo '<input type="password" id="consensuspress_unsplash_key"
                    name="consensuspress_unsplash_key"
                    value="' . esc_attr( $key ) . '"
                    class="regular-text" autocomplete="off" />';
          echo '<p class="description">' .
               esc_html__( 'Unsplash Access Key for featured image fetch. Leave empty to skip.', 'consensuspress' ) .
               '</p>';
        sanitise: "esc_attr() on output, sanitize_text_field() via register_setting callback"

  # ---------------------------------------------------------------------------
  # PART B: PHP 8.5 housekeeping — meta-box.php
  # ---------------------------------------------------------------------------
  meta_box_float_cast_fix:
    file: "plugin/consensuspress/includes/class-consensuspress-meta-box.php"
    fix: "OPEN-11-02 Fix 1 — implicit float→int cast"
    location: "Line 90 (approximately) — score display calculation"
    before: "/* implicit float-to-int cast generating PHP 8.5 deprecation */"
    change: "Wrap the float value in explicit (int) cast: (int) round( $score )"
    note: |
      Exact line to be confirmed by C-C via grep before patching.
      Command: grep -n "score" plugin/consensuspress/includes/class-consensuspress-meta-box.php

  test_meta_box_reflection_fix:
    file: "tests/test-meta-box.php"
    fix: "OPEN-11-02 Fix 2 — ReflectionMethod::setAccessible() deprecated PHP 8.1+"
    occurrences: 3
    pattern_before: |
      $method = new ReflectionMethod( 'ConsensusPress_Meta_Box', 'method_name' );
      $method->setAccessible( true );
      $result = $method->invoke( $instance, ...args );
    pattern_after: |
      $closure = Closure::bind( function( ...$args ) {
          return $this->method_name( ...$args );
      }, $instance, 'ConsensusPress_Meta_Box' );
      $result = $closure( ...args );
    note: |
      All three occurrences follow identical pattern — same fix applied three times.
      Test assertions are unchanged. Only invocation mechanism changes.
      C-C must grep for setAccessible in test-meta-box.php to confirm line numbers.

  # ---------------------------------------------------------------------------
  # PART C: readme.txt
  # ---------------------------------------------------------------------------
  readme_txt:
    file: "plugin/consensuspress/readme.txt"
    status: "NEW FILE"
    content_spec:
