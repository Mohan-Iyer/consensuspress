        exit 1
      fi
      echo "✅ Gate 4 passed: HAL-001 scanner"

      echo ""
      echo "✅ ALL GATES PASSED."

      # -----------------------------------------------------------------------
      # Dry-run exits here
      # -----------------------------------------------------------------------
      if [ "$DRY_RUN" = true ]; then
        echo "🔍 DRY RUN COMPLETE. Plugin is clean. SVN commit not executed."
        echo "   Run without --dry-run to proceed with WordPress.org submission."
        exit 0
      fi

      # -----------------------------------------------------------------------
      # Gate 5: SVN commit to WordPress.org
      # -----------------------------------------------------------------------
      echo "Gate 5: SVN commit to WordPress.org..."
      echo "Next step: svn commit to https://plugins.svn.wordpress.org/consensuspress/"
      echo "(SVN commit is a manual step — script confirms gates passed.)"
      echo ""
      echo "✅ Plugin ready for WordPress.org SVN submission."
