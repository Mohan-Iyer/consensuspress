# =============================================================================
# SPRINT 3: ASYNC + META BOX — D1-D7 SPECIFICATION
# =============================================================================
# Project:  ConsensusPress by Seekrates
# Sprint:   3 of 6
# Author:   D-C (Session 05)
# Date:     2026-03-01
# Method:   AFD v1.3.0
# HLR ref:  Build Sequence Steps 4-5 (async upgrade) + Step 8 (meta box)
# Mock ref: consensuspress_mock_api.yaml (fixtures 1, 4, 8)
# =============================================================================
# SCOPE:
#   Part A — Async upgrade: Create form submits topic → receives job_id
#   immediately → WP-Cron processes API call in background → JS polls
#   for completion every 5 seconds → redirect to draft on success.
#   Eliminates PHP timeout risk on shared hosts (30s limit).
#
#   Part B — Consensus Meta Box: Read-only sidebar panel on post edit
#   screen. Reads the 6 _consensuspress_* keys written by Post Builder
#   in Sprint 2. Displays score, champion, agreement, risk, mode, date.
#
# OUT OF SCOPE (future sprints):
#   - Rescue mode (Sprint 4)
#   - Diff viewer (Sprint 4)
#   - Usage tracking/tier enforcement (Sprint 5)
#   - WordPress.org packaging (Sprint 6)
# =============================================================================

version: "1.0.0"

# =============================================================================
# D0: PRESERVATION CONTRACTS — DO NOT BREAK
# =============================================================================
