      modification: "ADD require_once for 2 new classes + MODIFY ajax_create_post body + ADD ajax_poll_job + ADD cron hook"
      preserved_signatures:
        - { name: "consensuspress_activate",             note: "Unchanged" }
        - { name: "consensuspress_deactivate",            note: "Unchanged" }
        - { name: "consensuspress_init",                  note: "Body adds 2 require_once + 2 instantiations" }
        - { name: "consensuspress_ajax_test_connection",  note: "Unchanged" }
        - { name: "consensuspress_ajax_create_post",      note: "BODY changes — now schedules async job. Signature unchanged: (): void" }

    - file: "admin/js/consensuspress-create.js"
      modification: "ADD polling loop. Existing submit handler modified to expect job_id instead of direct result."

    - file: "admin/css/consensuspress-admin.css"
      modification: "APPEND meta box styles and polling status styles. No existing rules changed."

  files_not_modified:
    - "includes/class-consensuspress-api.php"
    - "includes/class-consensuspress-settings.php"
    - "includes/class-consensuspress-create.php"
    - "includes/class-consensuspress-post-builder.php"
    - "admin/views/settings.php"
    - "admin/views/create.php"
    - "admin/js/consensuspress-admin.js"
    - "uninstall.php"
    - "readme.txt"

  new_files:
    - "includes/class-consensuspress-async.php"
    - "includes/class-consensuspress-meta-box.php"
    - "admin/views/meta-box.php"
    - "tests/test-async.php"
