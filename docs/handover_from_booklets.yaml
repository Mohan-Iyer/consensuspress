# =============================================================================
# 2. THE CRITICAL PROBLEM YOU'RE SOLVING
# =============================================================================
problem:

  diagnosis: |
    seekrates_publisher is content-first, not keyword-first.
    Pipeline: interesting query → AI consensus → retrofit a keyword.
    Result: 201 posts with excellent on-page SEO targeting keywords
    nobody searches for. Only 1 keyword ranking. Near-zero organic traffic.

  root_cause: |
    RM score measures structural optimization, not search demand.
    A perfectly optimized post targeting a zero-volume keyword ranks nowhere.
    Google still indexes on keywords. LLMs cite pages that rank in Google.
    No Google rank → no LLM citation. GEO/AEO is additive, not replacement.

  required_inversion: |
    CURRENT:  query → content → retrofit keyword (broken)
    CORRECT:  keyword research (volume + difficulty) → design query → content

# =============================================================================
# 3. WHAT CONSENSUSPRESS MUST DO DIFFERENTLY
# =============================================================================
plugin_requirements:

  pipeline_inversion: |
    The WordPress plugin must start from keyword research, not content ideas.
    User flow: 
    1. User enters seed topic in WP admin
    2. Plugin suggests keywords with search volume + difficulty (via API)
    3. User selects keyword → plugin generates optimized query
    4. Query → Seekrates AI → consensus content
    5. Content formatted with keyword-first SEO → publish
    
    The keyword drives the query, not the other way around.

  keyword_api_options:
    - "Ahrefs API (paid, best data)"
    - "SEMrush API (paid, good data)"
    - "Google Keyword Planner API (free with Ads account)"
    - "KeywordTool.io API (freemium)"
    - "DataForSEO API (affordable, good for plugins)"

  architecture_note: |
    seekrates_publisher is Python. WordPress plugins are PHP.
    DO NOT translate Python → PHP line by line.
    Extract the LOGIC (pipeline steps, SEO rules, schema generation)
    and re-implement natively in PHP using WordPress conventions:
    - WP_REST_API for publishing (already native)
    - wp_remote_post() for Seekrates API calls
    - WordPress Settings API for configuration
    - WP-Cron for scheduling
    - Rank Math API hooks for SEO meta injection

