# =============================================================================
# D6: IMPORT SPECIFICATION
# =============================================================================
d6_import_specification:

  note: |
    No external imports. All tools use PHP built-in functions only.
    No Composer. No autoloader. Each tool is a standalone script.

  hal001_php_scanner:
    requires: "None — standalone script"
    built_ins_used:
      - "token_get_all() — PHP tokeniser"
      - "file_get_contents() — read source files"
      - "preg_match() / preg_match_all() — regex patterns"
      - "hash('sha256', ...) — NOT USED in this tool"
      - "is_dir(), is_file() — path validation"
      - "RecursiveDirectoryIterator — directory traversal"
      - "RecursiveIteratorIterator — flattening directory tree"

  inventory_php:
    requires: "None"
    built_ins_used:
      - "token_get_all()"
      - "file_get_contents()"
      - "hash('sha256', $content) — file hash for inventory"
      - "date('c') — ISO 8601 timestamp"

  wp_compliance_scanner:
    requires: "None"
    built_ins_used:
      - "file_get_contents()"
      - "file() — read file into lines array"
      - "preg_match() — regex pattern matching"
      - "RecursiveDirectoryIterator"
      - "RecursiveIteratorIterator"
      - "strpos() / str_contains() — string searching"

  test_files:
    requires: "PHPUnit (installed globally via apt — same as Sprint 1)"
    note: "phpunit.xml configures test suite. No additional dependencies."

# =============================================================================
# D7: TEST INFRASTRUCTURE
# =============================================================================
d7_test_infrastructure:

  phpunit_xml:
    bootstrap: "None — no bootstrap needed (no WP stubs required)"
    testsuite_name: "PHP-AFD-Tools"
    directory: "tests"
    prefix: "test-"

  fixture_file_specifications:

    clean_file_php: |
      <?php
      /**
       * Clean file — no violations expected.
       */
      if ( ! defined( 'ABSPATH' ) ) { exit; }

      /**
       * @param string $topic Query topic.
       * @return array{
       *   success: bool,
       *   data:    array{score: float, provider: string}|null,
       *   error:   array{code: string, message: string}|null
       * }
       */
      function query_api( string $topic ): array {
          $response = wp_remote_post( 'https://example.com', array() );
          if ( is_wp_error( $response ) ) {
              return array( 'success' => false, 'data' => null, 'error' => array( 'code' => 'fail', 'message' => 'Failed' ) );
          }
          $body = wp_remote_retrieve_body( $response );
          $data = json_decode( $body, true );
          if ( null === $data ) {
              return array( 'success' => false, 'data' => null, 'error' => array( 'code' => 'bad_json', 'message' => 'Invalid' ) );
          }
          return array( 'success' => true, 'data' => $data, 'error' => null );
      }

      /**
       * @param array{title: string, content: string} $post_data Post fields.
       * @return int Post ID.
       */
      function create_draft( array $post_data ): int {
          return wp_insert_post( $post_data );
      }

    type_erasure_violations_php: |
      <?php
      /**
       * File with known violations for testing.
       * DO NOT ADD @hal001-suppress — these must be detected.
       */

      // VIO_BARE_ARRAY_RETURN — function returns array, no PHPDoc shape
      function get_settings(): array {
          return array( 'key' => 'value' );
      }

      // VIO_MIXED_TYPE — mixed parameter
      function process_data( mixed $input ): string {
          return (string) $input;
      }

      // VIO_UNTYPED_PARAM — no type hint, no @param
      function transform( $data ) {
          return $data;
      }

      // VIO_JSON_DECODE_UNVALIDATED — json_decode with no check
      function parse_response( string $body ): array {
          $data = json_decode( $body, true );
          return $data['result'];
      }

    type_erasure_suppressed_php: |
      <?php
      /**
       * File with suppressed violations.
       */

      // @hal001-suppress WP core returns mixed
      function get_wp_option( string $key ): mixed {
          return get_option( $key );
      }

      /** @return array{id: int, name: string} */
      function get_clean_data(): array {
          return array( 'id' => 1, 'name' => 'test' );
      }

    wp_clean_plugin_php: |
      <?php
      if ( ! defined( 'ABSPATH' ) ) { exit; }

      function render_page() {
          if ( ! current_user_can( 'manage_options' ) ) { return; }
          $name = get_option( 'my_name', '' );
          echo '<h1>' . esc_html( $name ) . '</h1>';
      }

      function handle_save() {
          check_ajax_referer( 'my_nonce', 'nonce' );
          if ( ! current_user_can( 'manage_options' ) ) {
              wp_send_json_error( 'Forbidden' );
          }
          $value = sanitize_text_field( $_POST['value'] );
          update_option( 'my_value', $value );
          wp_send_json_success( 'Saved' );
      }
      add_action( 'wp_ajax_my_save', 'handle_save' );

    wp_violations_php: |
      <?php
      // HAL-WP-006: No ABSPATH check

      // HAL-WP-002: Unescaped output
      function show_name() {
          $name = get_option( 'my_name' );
          echo $name;
      }

      // HAL-WP-001: Unsanitized input
      function save_data() {
          $value = $_POST['value'];
          update_option( 'my_value', $value );
      }

      // HAL-WP-003: Missing nonce on AJAX handler
      function ajax_handler() {
          $data = sanitize_text_field( $_POST['data'] );
          wp_send_json_success( $data );
      }
      add_action( 'wp_ajax_my_action', 'ajax_handler' );

    inventory_sample_php: |
      <?php
      /**
       * Sample file for inventory testing.
       * Known inventory: 6 callables.
       */

      function global_function_one(): void {}

      function global_function_two( string $arg ): string { return $arg; }

      class SampleClass {
          public function public_method(): int { return 1; }
          protected function protected_method(): void {}
          private function private_method( string $x ): string { return $x; }
      }

      interface SampleInterface {
          public function interface_method(): array;
      }

  test_approach: |
    Each test class directly calls the tool's functions (require_once the tool file).
    Tests pass fixture file paths to scan_file() / inventory_file() / scan_wp_compliance().
    Assertions verify: violation counts, violation types, line numbers, exit codes.
    No mocking needed — tools operate on real PHP files (the fixtures).

