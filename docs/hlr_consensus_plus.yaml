# =============================================================================
# EXECUTIVE SUMMARY
# =============================================================================
executive_summary:
  product_name: "ConsensusPress"
  tagline: "AI-Search Resilient Content Infrastructure for WordPress"

  what_it_is: |
    A WordPress plugin that connects to the Seekrates AI consensus engine
    (hosted on Railway at app.seekrates-ai.com) to generate and rescue
    blog content validated by five independent LLM providers (OpenAI,
    Claude, Gemini, Mistral, Cohere). The plugin is a thin API client —
    all intelligence stays on the Seekrates server. The plugin handles
    WordPress-native delivery: auto-import as draft, featured image
    sideload, Rank Math metadata injection, schema markup insertion,
    and Rescue diff comparison.

  what_it_is_NOT: |
    - NOT an AI writer (positioning is "search survival infrastructure")
    - NOT a local LLM integration (engine stays on Railway)
    - NOT a text editor with an AI button
    - NOT competing with Jasper/Copy.ai on speed or volume
    - It IS an automation pipeline inside WordPress

  strategic_purpose:
    - "Revenue: WordPress.org (810M sites) + WarriorPlus + affiliate markets"
    - "Proof: Portfolio piece for freelance AI dev markets (Codeable, Upwork, Toptal)"
    - "Flywheel: Every plugin install = Seekrates AI customer by proxy"
    - "AFD validation: Proves methodology works for WordPress plugin product type"
    - "First vertical wrapper sold as standalone product"

  proven_corpus: |
    164 published posts, 81+ Rank Math average, indexed and ranking.
    This is not a beta — the methodology has been validated at scale
    across seekrates-ai.com, aihorizon.net, and pixels.net.nz.

# =============================================================================
# POSITIONING (from Gemini + ChatGPT competitive analysis)
# =============================================================================
positioning:

  category: "AI-Search Resilient Content Infrastructure"
  NOT_category: "AI content writer"

  competitive_wedge:
    - "Cross-model validation (5 independent LLMs)"
    - "Hallucination filtering (12 refusal patterns, quality scoring)"
    - "Risk flagging (Oracle Risk Analysis on model disagreement)"
    - "AI-search optimisation (GEO + LLMO + AEO) built into every post"
    - "Rescue of traffic lost to AI search (unique — no competitor offers this)"

  differentiator_vs_competitors: |
    Jasper, Copy.ai, Writesonic, Surfer SEO, Frase, MarketMuse, Koala.sh,
    Byword.ai, SEO.ai — ALL use a single LLM. When that model hallucinates,
    the customer publishes fabricated content. ConsensusPress validates every
    claim across five providers. A single LLM is a liability. Consensus is
    insurance.

  two_layer_messaging:
    wordpress_org_listing: |
      "AI content that ranks in Google AND gets cited by AI search engines.
      Five AI models validate every post. Hallucinations caught before
      you publish. 81+ Rank Math scores proven across 164 posts."
    agency_pitch: |
      "Search survival infrastructure for the AI era. Your clients' content
      validated by five independent AI providers. White-label reports.
      Rescue service for posts that lost rankings to AI search."

