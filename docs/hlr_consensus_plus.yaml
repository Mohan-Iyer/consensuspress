# =============================================================================
# PRODUCT: TWO MODES, ONE ENGINE
# =============================================================================
product_modes:

  mode_1_create:
    name: "ConsensusPress Create"
    status: "DELIVERED — v1.5.0"
    user_action: "Enter topic + optional context in WP admin panel"
    engine_action: |
      Topic dispatched to Seekrates AI consensus engine via API.
      Five LLMs respond independently. Quality scoring applied.
      Refusals detected (12 patterns). Champion selected.
      Synthesis generated. Oracle Risk Analysis produced.
    wordpress_action: |
      - Auto-import as draft post (NOT published — user reviews first)
      - Featured image sideloaded from Unsplash with proper alt/title
      - Rank Math metadata injected (focus keyword, meta description, SEO title)
      - Schema markup inserted (FAQ + Article)
      - Consensus score displayed in post meta box
      - Post structured for AI-search optimisation (GEO/LLMO/AEO):
        * 40-60 word paragraphs
        * Question-format H2 headings
        * Structured data for AI crawlers
    user_reviews: "Draft appears in Posts list. User reviews, edits, publishes."
    async_pattern: "Job scheduled via WP-Cron transient. AJAX polls every 5s. 120s timeout."

  mode_2_rescue:
    name: "ConsensusPress Rescue"
    status: "DELIVERED — v1.5.0"
    user_action: "Select existing published post from dropdown"
    engine_action: |
      Existing content fetched and analysed for GEO/LLMO/AEO gaps.
      Content restructured through 5-LLM consensus pipeline.
      Before/after comparison generated.
    wordpress_action: |
      - Rescued version saved as NEW DRAFT (original post NEVER modified — D-04-01)
      - Side-by-side diff comparison visible in admin
      - Original post ID stored in _consensuspress_original_post_id meta
      - Schema and metadata updated in rescued version
    user_reviews: "User compares original vs rescued via diff viewer. Publishes when satisfied."
    async_pattern: "Same polling pattern as Create. Rescue costs 2 credits (Create costs 1)."
    note_url_input: "URL input NOT implemented — dropdown only (spec simplification)"

# =============================================================================
# TECHNICAL ARCHITECTURE
# =============================================================================
architecture:

  principle: |
    Plugin is a THIN API CLIENT. All LLM intelligence stays on the
    Seekrates AI Railway server. Plugin handles WordPress-native
    delivery and UI only. This protects IP and keeps marginal cost
    per query under Seekrates control.

  communication:
    protocol: "HTTPS REST API"
    endpoint: "app.seekrates-ai.com/api/v1/consensus"
    status: "ENDPOINT NOT YET BUILT — blocker B-01-01"
    authentication: "Bearer token (API key stored in wp_options)"
    timeout: "120 seconds"
    retry: "Exponential backoff, max 3 attempts"
    payload_out:
      - "query (topic or existing content)"
      - "mode (create | rescue)"
      - "context (optional user-provided context)"
      - "api_key"
    payload_in:
      - "champion_response (winning LLM output)"
      - "synthesis (combined consensus view)"
      - "consensus_score (percentage agreement)"
      - "oracle_risk (disagreement analysis)"
      - "individual_responses (all 5, for transparency)"
      - "metadata (suggested title, focus keyword, meta description)"
      - "schema_markup (FAQ + Article JSON-LD)"
      - "featured_image_url (Unsplash)"

  wordpress_integration:
    post_creation:
      - "wp_insert_post() — create draft with consensus content"
      - "set_post_thumbnail() — sideload featured image"
      - "update_post_meta() — Rank Math SEO fields"
      - "wp_insert_term() — assign categories/tags from metadata"
    rank_math_injection:
      - "rank_math_focus_keyword"
      - "rank_math_description"
      - "rank_math_title"
      - "rank_math_schema_Article"
      - "rank_math_schema_FAQPage"
    admin_ui:
      - "Settings page (API key, default post status)"
      - "Create page (topic input, context textarea, async submit + polling)"
      - "Rescue page (published post dropdown, async submit + polling)"
      - "Consensus meta box on post edit screen (score, risk, champion, mode)"
      - "Diff comparison view (Rescue mode — side-by-side pure PHP)"

  api_endpoint_requirements: |
    NOTE: The Seekrates AI server (Railway) needs a new API endpoint
    specifically for ConsensusPress. This is a thin wrapper around
    the existing consensus_engine.py with JSON request/response
    instead of the current web form + email delivery model.

    New endpoint: POST /api/v1/consensus
    Auth: Bearer token (API key)
    Response: JSON (not email)

    This is the ONLY change needed on the Seekrates AI side.

# =============================================================================
# WORDPRESS PLUGIN TECHNICAL ARCHITECTURE (v1.1.0)
# =============================================================================
wp_plugin_technical_architecture:

  hook_system:
    principle: "WordPress event-driven architecture — all plugin execution via hooks"
    actions_registered:
      - "plugins_loaded — boot all classes via consensuspress_init()"
      - "admin_menu — register ConsensusPress admin pages (Settings, Create, Rescue)"
      - "admin_enqueue_scripts — load admin CSS/JS on plugin pages only"
      - "wp_ajax_consensuspress_test_connection — settings page API test"
      - "wp_ajax_consensuspress_create_post — AJAX handler for Create mode"
      - "wp_ajax_consensuspress_poll_job — AJAX polling for Create async results"
      - "wp_ajax_consensuspress_rescue_post — AJAX handler for Rescue mode"
      - "wp_ajax_consensuspress_poll_rescue_job — AJAX polling for Rescue async results"
      - "add_meta_boxes — register consensus score meta box on post editor"
      - "consensuspress_process_job (WP-Cron) — async job processor"
    filters:
      - "plugin_action_links — add Settings link to plugins list"

  lifecycle_hooks:
    activation:
      hook: "register_activation_hook"
      function: "consensuspress_activate()"
    deactivation:
      hook: "register_deactivation_hook"
      function: "consensuspress_deactivate()"
      actions:
        - "Clear transients"
        - "Unschedule WP-Cron events"
        - "Do NOT delete data"
    uninstall:
      hook: "uninstall.php"
      actions:
        - "Delete 3 options: consensuspress_api_key, consensuspress_post_status, consensuspress_usage"
        - "Delete 9 post_meta keys (_consensuspress_* prefix)"
        - "Leave no trace"

  persistence:
    options_api:
      keys:
        - "consensuspress_api_key — Seekrates API key"
        - "consensuspress_post_status — default post status (draft|pending)"
        - "consensuspress_usage — serialised usage state (see usage_tracking)"

    post_meta:
      keys:
        - "_consensuspress_score — float (0-100)"
        - "_consensuspress_mode — create|rescue"
        - "_consensuspress_champion_provider — winning LLM name"
        - "_consensuspress_agreement_level — HIGH|MODERATE|LOW"
        - "_consensuspress_oracle_risk_level — low|medium|high|critical"
        - "_consensuspress_created_at — datetime of consensus query"
        - "_consensuspress_original_post_id — int (Rescue: original post ID)"

    transients:
      - "consensuspress_job_{uuid} — async job state (TTL: 2 hours)"

    usage_tracking:
      storage: "wp_options key: consensuspress_usage (serialised array)"
      note: "Custom DB table NOT implemented — wp_options chosen for simplicity"
      fields:
        - "credits_used — int"
        - "credits_limit — int"
        - "tier — free|starter|pro|business|agency|enterprise|unlimited"
        - "reset_date — next monthly reset datetime string"
        - "last_updated — datetime"
      credit_costs:
        create: 1
        rescue: 2
      default_tier: "free"
      default_limit: 3
      reset_mechanism: "auto-reset-on-read (monthly, no WP-Cron required)"
      soft_gate: "check_quota() in AJAX handlers — blocks before scheduling"
      hard_gate: "HTTP 402 from server triggers handle_quota_exceeded() — syncs local state"
      admin_notice: "Shown at >=80% usage on ConsensusPress admin pages only"

  security:
    nonces:
      - "consensuspress_test_connection"
      - "consensuspress_create_post"
      - "consensuspress_poll_job"
      - "consensuspress_rescue_post"
      - "consensuspress_poll_rescue_job"
    sanitization: "sanitize_text_field(), sanitize_textarea_field(), absint() throughout"
    escaping: "esc_html(), esc_attr(), esc_url() throughout"
    capability_checks:
      - "manage_options — settings page"
      - "edit_posts — Create + Rescue operations"

  async_pattern:
    type: "WP-Cron + AJAX polling (REST+AJAX hybrid)"
    create_flow:
      - "JS submits topic → consensuspress_create_post handler"
      - "Handler validates, schedules WP-Cron job, returns job_id"
      - "JS polls every 5s → consensuspress_poll_job handler"
      - "Handler reads transient, returns status (pending|processing|complete|failed)"
      - "On complete: JS redirects to draft edit screen"
    rescue_flow:
      - "JS submits post_id → consensuspress_rescue_post handler"
      - "Handler extracts post content (max 50,000 chars), schedules job, returns job_id"
      - "JS polls every 5s → consensuspress_poll_rescue_job handler"
      - "On complete: JS redirects to diff view"
    timeout: "120 seconds (24 polls × 5s)"

