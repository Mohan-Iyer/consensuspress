# =============================================================================
# SPRINT 5: USAGE TRACKING + TIER ENFORCEMENT — D1-D7 SPECIFICATION
# =============================================================================
# Project:  ConsensusPress by Seekrates
# Sprint:   5 of 6
# Author:   D-C (Session 06)
# Date:     2026-03-01
# Method:   AFD v1.3.0
# HLR ref:  Build Sequence Step 9
# Mock ref: consensuspress_mock_api.yaml (fixture_usage_exceeded — HTTP 402)
# =============================================================================
# SCOPE:
#   Credit-based usage tracking stored in wp_options.
#   Soft gate on AJAX handlers (check_quota before scheduling job).
#   Hard enforcement via server 402 (handle_quota_exceeded syncs truth).
#   Monthly auto-reset on read (no WP-Cron dependency).
#   Admin notice on ConsensusPress pages when quota ≥ 80% used or exceeded.
#
# ARCHITECTURE DECISION (Anti-Magical-Leap outcome):
#   H4 Hybrid wins: plugin tracks locally (UI + soft gate) + server enforces (402).
#   Auto-reset-on-read chosen over WP-Cron for monthly reset (simpler, reliable).
#
# CREDIT COSTS:
#   Create = 1 credit
#   Rescue = 2 credits (matches HLR pricing: rescue costs 2x)
#
# DEFAULT TIER:
#   'free' — 3 posts/month. Applied on fresh install or unknown tier.
#   Tier/limit updated from server 402 body when available.
#
# OUT OF SCOPE:
#   WordPress.org packaging (Sprint 6)
# =============================================================================

