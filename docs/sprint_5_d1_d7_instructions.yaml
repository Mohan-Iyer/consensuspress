# =============================================================================
# DECISIONS
# =============================================================================
decisions:

  - id: "D-05-01"
    decision: "Auto-reset-on-read, not WP-Cron recurring event"
    rationale: |
      WP-Cron recurring events require custom schedule registration,
      wp_next_scheduled checks, and additional bootstrap stubs.
      Auto-reset-on-read is simpler, self-healing, and equally reliable —
      any call to get_usage() corrects state if billing period has passed.
    reversible: true

  - id: "D-05-02"
    decision: "Default tier is 'free' (3 posts/month)"
    rationale: |
      Matches HLR channel_1: 'free version (3 posts/month)' for WordPress.org.
      Users who purchase upgrade API keys will receive correct tier via server
      402 data or future tier-info endpoint. Conservative default protects margin.
    reversible: false

  - id: "D-05-03"
    decision: "Rescue costs 2 credits, not 1"
    rationale: |
      Matches HLR pricing: 'rescue_single: $19/post' vs 'create_single: $9/post'.
      2x credit cost reflects 2x API cost (same 5-model query run on existing content
      plus additional restructuring logic). Revenue model alignment.
    reversible: false

  - id: "D-05-04"
    decision: "handle_quota_exceeded() accepts full $result, not just error body"
    rationale: |
      ConsensusPress_API::query() currently strips extra 402 fields (tier/used/limit)
      from the error body. Passing the full result array future-proofs this method —
      when the API class is extended to pass extra 402 data through, handle_quota_exceeded()
      will use it automatically without interface changes.
    reversible: true

  - id: "D-05-05"
    decision: "Quota gate placed AFTER security checks, BEFORE business logic"
    rationale: |
      Security (nonce + capability) always runs first — non-negotiable.
      Quota check runs second — fast fail before any DB or async work.
      This ordering: auth → quota → validate inputs → schedule job.
    reversible: false

  - id: "D-05-06"
    decision: "Admin notice uses get_current_screen() guard — no output outside CP pages"
    rationale: |
      admin_notices fires on every admin page. Without the screen guard,
      quota warnings would appear on posts list, media library, etc.
      Confusing for users. CP-only scope is strictly more correct.
    reversible: false

