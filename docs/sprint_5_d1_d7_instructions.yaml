# =============================================================================
# D1: FUNCTION SIGNATURES
# =============================================================================
d1_signatures:

  # ---------------------------------------------------------------------------
  # FILE: includes/class-consensuspress-usage.php (NEW)
  # ---------------------------------------------------------------------------
  class_consensuspress_usage:
    file: "includes/class-consensuspress-usage.php"
    class: "ConsensusPress_Usage"
    version: "1.0.0"
    purpose: |
      Credit-based usage tracking and tier enforcement.
      Stores state in wp_options. Auto-resets monthly on read.
      Soft gate via check_quota(). Hard enforcement via handle_quota_exceeded() on 402.

    constants:
      OPTION_KEY:
        type: string
        value: "'consensuspress_usage'"
        purpose: "wp_options key for serialised usage state"

      CREDIT_COST:
        type: "array<string, int>"
        value: "array( 'create' => 1, 'rescue' => 2 )"
        purpose: "Credits debited per operation. Rescue costs 2x per HLR pricing."

      TIERS:
        type: "array<string, array{label: string, limit: int}>"
        value: |
          array(
            'free'       => array( 'label' => 'Free',        'limit' => 3   ),
            'starter'    => array( 'label' => 'Starter',     'limit' => 10  ),
            'pro'        => array( 'label' => 'Pro',         'limit' => 30  ),
            'business'   => array( 'label' => 'Business',    'limit' => 100 ),
            'agency'     => array( 'label' => 'Agency',      'limit' => 50  ),
            'enterprise' => array( 'label' => 'Enterprise',  'limit' => 200 ),
            'unlimited'  => array( 'label' => 'Unlimited',   'limit' => 999999 ),
          )
        purpose: "Tier definitions. Limit = monthly credit allowance."

      WARN_THRESHOLD:
        type: float
        value: "0.80"
        purpose: "Admin notice appears when credits_used / credits_limit >= 0.80"

    methods:

      init:
        signature: "public function init(): void"
        purpose: "Register admin notice hook for quota warnings on ConsensusPress pages."
        body_logic: |
          add_action( 'admin_notices', array( $this, 'render_quota_notice' ) );

      record_usage:
        signature: "public function record_usage( string $mode ): void"
        purpose: |
          Increment credits_used after a successful consensus job.
          Create = 1 credit. Rescue = 2 credits.
          Silently ignores unknown modes (logs nothing — no bloat).
          Called by ConsensusPress_Async::process_job() AFTER successful draft creation.
        params:
          mode:
            type: string
            values: "'create' | 'rescue'"
            description: "Job mode — determines credit cost"
        body_logic: |
          $cost = self::CREDIT_COST[ $mode ] ?? 0;
          if ( 0 === $cost ) {
            return;
          }
          $usage                 = $this->get_stored_usage();
          $usage['credits_used'] = $usage['credits_used'] + $cost;
          $usage['last_updated'] = current_time( 'mysql' );
          update_option( self::OPTION_KEY, $usage );

      check_quota:
        signature: "public function check_quota( string $mode = 'create' ): array"
        purpose: |
          Check whether the current usage state allows another job of the given mode.
          Returns array{allowed: bool, credits_remaining: int, message: string}.
          Used as a soft gate in AJAX handlers BEFORE scheduling the job.
        params:
          mode:
            type: string
            default: "'create'"
            values: "'create' | 'rescue'"
        returns: |
          array{
            allowed:           bool,
            credits_remaining: int,
            message:           string
          }
        body_logic: |
          $usage     = $this->get_stored_usage();
          $cost      = self::CREDIT_COST[ $mode ] ?? 1;
          $remaining = $usage['credits_limit'] - $usage['credits_used'];
          $allowed   = ( $remaining >= $cost );

          if ( $allowed ) {
            return array(
              'allowed'           => true,
              'credits_remaining' => $remaining,
              'message'           => '',
            );
          }

          $tier_label = self::TIERS[ $usage['tier'] ]['label'] ?? 'Free';
          return array(
            'allowed'           => false,
            'credits_remaining' => max( 0, $remaining ),
            'message'           => sprintf(
              /* translators: %1$s = tier name, %2$s = reset date */
              __(
                'Monthly limit reached on your %1$s plan. Credits reset on %2$s. Upgrade at seekrates-ai.com/pricing.',
                'consensuspress'
              ),
              esc_html( $tier_label ),
              esc_html( date( 'M j, Y', strtotime( $usage['reset_date'] ) ) )
            ),
          );

      handle_quota_exceeded:
        signature: "public function handle_quota_exceeded( array $api_result ): void"
        purpose: |
          Called by process_job() when API returns HTTP 402 (usage_exceeded).
          Updates stored usage to reflect server truth.
          Accepts full $result array from ConsensusPress_API::query().
          Extracts tier/used/limit if present in error_data (future-proofs against
          API returning extra 402 fields). At minimum, sets credits_used = credits_limit
          to signal the quota is exhausted locally.
        params:
          api_result:
            type: "array{success: bool, data: null, error: array{code: string, message: string}, http_status: int}"
            description: "Full result from ConsensusPress_API::query() on 402 response"
        body_logic: |
          $usage = $this->get_stored_usage();

          // Update with any server-provided tier/limit data.
          // The API class currently extracts only code + message from error bodies.
          // This block is future-proof: if richer 402 data is ever passed through,
          // it will be used automatically.
          $error = $api_result['error'] ?? array();
          if ( isset( $error['tier'] ) && array_key_exists( $error['tier'], self::TIERS ) ) {
            $usage['tier']          = $error['tier'];
            $usage['credits_limit'] = self::TIERS[ $error['tier'] ]['limit'];
          }
          if ( isset( $error['used'] ) && is_int( $error['used'] ) ) {
            $usage['credits_used'] = $error['used'];
          } else {
            // Minimum: mark as exhausted by setting used = limit.
            $usage['credits_used'] = $usage['credits_limit'];
          }

          $usage['last_updated'] = current_time( 'mysql' );
          update_option( self::OPTION_KEY, $usage );

      get_usage:
        signature: "public function get_usage(): array"
        purpose: |
          Return current usage state. Auto-resets if past reset_date.
          Safe to call frequently — no side effects beyond auto-reset.
        returns: |
          array{
            credits_used:      int,
            credits_limit:     int,
            tier:              string,
            reset_date:        string,   # MySQL datetime
            credits_remaining: int,
            last_updated:      string
          }
        body_logic: |
          $usage = $this->get_stored_usage();
          $usage['credits_remaining'] = max( 0, $usage['credits_limit'] - $usage['credits_used'] );
          return $usage;

      render_quota_notice:
        signature: "public function render_quota_notice(): void"
        purpose: |
          Admin notice hook. Renders quota warning ONLY on ConsensusPress admin pages.
          Warning at >= 80% used. Error (red) at >= 100% used.
          Uses standard WordPress notice classes — no custom JS needed.
        body_logic: |
          // Only render on ConsensusPress admin pages.
          $screen = get_current_screen();
          if ( ! $screen || false === strpos( $screen->id, 'consensuspress' ) ) {
            return;
          }

          $usage   = $this->get_stored_usage();
          $used    = $usage['credits_used'];
          $limit   = $usage['credits_limit'];
          $ratio   = ( $limit > 0 ) ? ( $used / $limit ) : 0.0;

          if ( $ratio < self::WARN_THRESHOLD ) {
            return; // Under 80% — no notice needed.
          }

          $tier_label = self::TIERS[ $usage['tier'] ]['label'] ?? 'Free';
          $reset      = date( 'M j, Y', strtotime( $usage['reset_date'] ) );

          if ( $ratio >= 1.0 ) {
            $class   = 'notice notice-error';
            $message = sprintf(
              __( '<strong>ConsensusPress:</strong> Monthly limit reached on your %1$s plan (%2$d/%3$d credits). Credits reset on %4$s. <a href="%5$s">Upgrade now.</a>', 'consensuspress' ),
              esc_html( $tier_label ), (int) $used, (int) $limit, esc_html( $reset ),
              esc_url( 'https://seekrates-ai.com/pricing' )
            );
          } else {
            $class   = 'notice notice-warning';
            $message = sprintf(
              __( '<strong>ConsensusPress:</strong> %1$d of %2$d monthly credits used on your %3$s plan. Credits reset on %4$s.', 'consensuspress' ),
              (int) $used, (int) $limit, esc_html( $tier_label ), esc_html( $reset )
            );
          }

          printf( '<div class="%s"><p>%s</p></div>', esc_attr( $class ), wp_kses_post( $message ) );

    private_methods:

      get_stored_usage:
        signature: "private function get_stored_usage(): array"
        purpose: |
          Read stored usage from wp_options. Apply defaults for fresh install.
          Call auto_reset_if_needed() before returning.
        body_logic: |
          $defaults = array(
            'credits_used'  => 0,
            'credits_limit' => self::TIERS['free']['limit'],
            'tier'          => 'free',
            'reset_date'    => $this->next_reset_date(),
            'last_updated'  => current_time( 'mysql' ),
          );

          $stored = get_option( self::OPTION_KEY, array() );
          if ( ! is_array( $stored ) ) {
            $stored = array();
          }

          $usage = array_merge( $defaults, $stored );
          return $this->auto_reset_if_needed( $usage );

      auto_reset_if_needed:
        signature: "private function auto_reset_if_needed( array $usage ): array"
        purpose: |
          If current time has passed reset_date, zero credits_used and advance reset_date.
          Saves to wp_options if reset was applied.
        body_logic: |
          if ( time() > strtotime( $usage['reset_date'] ) ) {
            $usage['credits_used'] = 0;
            $usage['reset_date']   = $this->next_reset_date();
            $usage['last_updated'] = current_time( 'mysql' );
            update_option( self::OPTION_KEY, $usage );
          }
          return $usage;

      next_reset_date:
        signature: "private function next_reset_date(): string"
        purpose: |
          Return first day of next calendar month as MySQL datetime string.
          Example: called 2026-03-15 → returns '2026-04-01 00:00:00'.
        body_logic: |
          return date( 'Y-m-01 00:00:00', strtotime( 'first day of next month' ) );

  # ---------------------------------------------------------------------------
  # FILE: consensuspress.php (MODIFIED — v1.3.0 → v1.4.0)
  # ---------------------------------------------------------------------------
  consensuspress_php_quota_gate:
    note: "Quota check block added at the top of each AJAX handler AFTER existing security checks."
    placement_rule: "AFTER check_ajax_referer() and current_user_can() — BEFORE any business logic."

    quota_check_snippet_create: |
      // Sprint 5 — Quota gate.
      $usage = new ConsensusPress_Usage();
      $quota = $usage->check_quota( 'create' );
      if ( ! $quota['allowed'] ) {
        wp_send_json_error( array(
          'message'     => $quota['message'],
          'upgrade_url' => 'https://seekrates-ai.com/pricing',
        ) );
      }

    quota_check_snippet_rescue: |
      // Sprint 5 — Quota gate.
      $usage = new ConsensusPress_Usage();
      $quota = $usage->check_quota( 'rescue' );
      if ( ! $quota['allowed'] ) {
        wp_send_json_error( array(
          'message'     => $quota['message'],
          'upgrade_url' => 'https://seekrates-ai.com/pricing',
        ) );
      }

  # ---------------------------------------------------------------------------
  # FILE: includes/class-consensuspress-async.php (MODIFIED — v1.1.0 → v1.2.0)
  # ---------------------------------------------------------------------------
  async_additions:
    note: "Two additions only. All existing logic preserved verbatim."

    addition_1_record_usage:
      placement: "process_job() — AFTER $job_data['status'] = 'complete' line, BEFORE final set_transient"
      code: |
        // Sprint 5 — Record credit usage after successful draft creation.
        ( new ConsensusPress_Usage() )->record_usage( $mode );

    addition_2_handle_quota_exceeded:
      placement: "process_job() — in the $result['success'] === false branch, ADD a check for 402"
      code: |
        // Sprint 5 — Sync quota state from server on 402.
        if ( 402 === ( $result['http_status'] ?? 0 ) ) {
          ( new ConsensusPress_Usage() )->handle_quota_exceeded( $result );
        }
      note: |
        This block is inserted BEFORE the existing error assignment into $job_data,
        within the if ( ! $result['success'] ) branch. Order:
          1. Check 402 + call handle_quota_exceeded()   <- NEW
          2. Existing: set $job_data['error'] from $result['error']   <- UNCHANGED
          3. Existing: set_transient with failed status   <- UNCHANGED

# =============================================================================
# D2: CONSTANTS AND OPTIONS
# =============================================================================
d2_constants:

  option_consensuspress_usage:
    key: "consensuspress_usage"
    type: "array (PHP serialized by WordPress)"
    shape: |
      array{
        credits_used:  int,      // total credits used this period
        credits_limit: int,      // max credits allowed this period
        tier:          string,   // 'free' | 'starter' | 'pro' | 'business' | 'agency' | 'enterprise' | 'unlimited'
        reset_date:    string,   // MySQL datetime: 'YYYY-MM-DD HH:MM:SS' — first of next month
        last_updated:  string,   // MySQL datetime of last modification
      }
    default_value: |
      array(
        'credits_used'  => 0,
        'credits_limit' => 3,           // free tier
        'tier'          => 'free',
        'reset_date'    => (computed),
        'last_updated'  => (current_time mysql),
      )
    written_by:
      - "ConsensusPress_Usage::record_usage()"
      - "ConsensusPress_Usage::handle_quota_exceeded()"
      - "ConsensusPress_Usage::auto_reset_if_needed()"
    read_by:
      - "ConsensusPress_Usage::get_stored_usage()"
      - "ConsensusPress_Usage::check_quota()"
      - "ConsensusPress_Usage::render_quota_notice()"
      - "ConsensusPress_Usage::get_usage()"

  credit_costs:
    create: 1
    rescue: 2
    note: "Rescue = 2x per HLR pricing. Matches positioning_strategy.yaml."

  tier_limits:
    free:       3
    starter:    10
    pro:        30
    business:   100
    agency:     50
    enterprise: 200
    unlimited:  999999

# =============================================================================
# D3: CONTRACT VERIFICATION (DOUBLE-ENTRY)
# =============================================================================
d3_contracts:

  contract_01:
    name: "process_job() → record_usage() on success"
    debit:
      producer: "ConsensusPress_Async::process_job() — success branch"
      output: "Calls ConsensusPress_Usage::record_usage( $mode ) where $mode = 'create' or 'rescue'"
    credit:
      consumer: "ConsensusPress_Usage::record_usage()"
      input: "Receives string $mode, reads CREDIT_COST[$mode], increments credits_used in wp_options"
    balanced: true

  contract_02:
    name: "process_job() → handle_quota_exceeded() on 402"
    debit:
      producer: "ConsensusPress_Async::process_job() — failure branch, http_status === 402"
      output: "Calls ConsensusPress_Usage::handle_quota_exceeded( $result )"
    credit:
      consumer: "ConsensusPress_Usage::handle_quota_exceeded()"
      input: |
        Receives array $api_result (full result from API query).
        Reads http_status, optional error sub-keys.
        Updates credits_used = credits_limit (minimum), optionally tier/limit if server provides.
    balanced: true

  contract_03:
    name: "consensuspress_ajax_create_post() quota gate"
    debit:
      producer: "consensuspress_ajax_create_post()"
      output: "Calls ConsensusPress_Usage::check_quota('create')"
    credit:
      consumer: "ConsensusPress_Usage::check_quota()"
      input: "Returns array{allowed: bool, credits_remaining: int, message: string}"
    post_condition: "If !allowed: wp_send_json_error({message, upgrade_url}) + return. Job never scheduled."
    balanced: true

  contract_04:
    name: "consensuspress_ajax_rescue_post() quota gate"
    debit:
      producer: "consensuspress_ajax_rescue_post()"
      output: "Calls ConsensusPress_Usage::check_quota('rescue')"
    credit:
      consumer: "ConsensusPress_Usage::check_quota()"
      input: "Receives 'rescue', applies CREDIT_COST['rescue'] = 2 in limit check"
    post_condition: "If !allowed: wp_send_json_error + return. Rescue job never scheduled."
    balanced: true

  contract_05:
    name: "get_stored_usage() → auto_reset_if_needed() → get_usage()"
    debit:
      producer: "ConsensusPress_Usage::get_usage() and check_quota()"
      output: "Both call get_stored_usage() which calls auto_reset_if_needed()"
    credit:
      consumer: "auto_reset_if_needed()"
      input: "Receives full $usage array, checks time() vs strtotime(reset_date)"
    post_condition: |
      If reset triggered: credits_used = 0, reset_date advances, update_option called.
      Returned usage always reflects current billing period state.
    balanced: true

  contract_06:
    name: "render_quota_notice() → wp_options → admin HTML"
    debit:
      producer: "ConsensusPress_Usage::render_quota_notice() — hooked to admin_notices"
      output: "Reads get_stored_usage(), outputs WordPress notice div"
    credit:
      consumer: "WordPress admin page render (HTML sink)"
      input: |
        <div class="notice notice-warning|notice-error">
          <p>[message with tier name, used/limit counts, reset date, upgrade link]</p>
        </div>
    conditions: |
      Only renders on pages where screen->id contains 'consensuspress'.
      Only renders when ratio >= WARN_THRESHOLD (0.80).
    balanced: true

