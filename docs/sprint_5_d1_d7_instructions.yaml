# =============================================================================
# D5: TEST SCENARIOS
# =============================================================================
d5_test_scenarios:

  file: "tests/test-usage.php"
  class: "ConsensusPress_Usage_"
  test_count: 8

  tests:

    test_default_usage_is_free_tier:
      purpose: "Fresh install returns free tier defaults: credits_used=0, credits_limit=3, tier='free'"
      setup: "No _cp_usage_option seeded — get_option returns empty array"
      assertion: |
        $usage = new ConsensusPress_Usage();
        $data  = $usage->get_usage();
        assertSame( 0, $data['credits_used'] );
        assertSame( 3, $data['credits_limit'] );
        assertSame( 'free', $data['tier'] );

    test_record_usage_create_increments_by_one:
      purpose: "record_usage('create') increments credits_used by 1"
      setup: "Seed _cp_usage_option with credits_used=2, credits_limit=3, tier='free'"
      assertion: |
        $usage = new ConsensusPress_Usage();
        $usage->record_usage( 'create' );
        $data = $usage->get_usage();
        assertSame( 3, $data['credits_used'] );

    test_record_usage_rescue_increments_by_two:
      purpose: "record_usage('rescue') increments credits_used by 2"
      setup: "Seed _cp_usage_option with credits_used=0, credits_limit=10, tier='starter'"
      assertion: |
        $usage = new ConsensusPress_Usage();
        $usage->record_usage( 'rescue' );
        $data = $usage->get_usage();
        assertSame( 2, $data['credits_used'] );

    test_check_quota_allowed_when_credits_remain:
      purpose: "check_quota('create') returns allowed=true when credits remain"
      setup: "Seed credits_used=2, credits_limit=10, tier='starter'"
      assertion: |
        $usage = new ConsensusPress_Usage();
        $quota = $usage->check_quota( 'create' );
        assertTrue( $quota['allowed'] );
        assertSame( 8, $quota['credits_remaining'] );

    test_check_quota_blocked_when_exhausted:
      purpose: "check_quota('create') returns allowed=false when at limit"
      setup: "Seed credits_used=10, credits_limit=10, tier='starter'"
      assertion: |
        $usage = new ConsensusPress_Usage();
        $quota = $usage->check_quota( 'create' );
        assertFalse( $quota['allowed'] );
        assertSame( 0, $quota['credits_remaining'] );
        assertNotEmpty( $quota['message'] );

    test_check_quota_rescue_needs_two_credits:
      purpose: "Rescue blocked when only 1 credit remains (rescue costs 2)"
      setup: "Seed credits_used=9, credits_limit=10, tier='starter'"
      assertion: |
        $usage = new ConsensusPress_Usage();
        $quota = $usage->check_quota( 'rescue' );
        assertFalse( $quota['allowed'] ); // 10-9=1 remaining, rescue costs 2

    test_handle_quota_exceeded_marks_as_exhausted:
      purpose: "handle_quota_exceeded() sets credits_used = credits_limit"
      setup: "Seed credits_used=5, credits_limit=10"
      call: |
        $result = array(
          'success'     => false,
          'data'        => null,
          'error'       => array( 'code' => 'usage_exceeded', 'message' => 'Limit reached.' ),
          'http_status' => 402,
        );
      assertion: |
        $usage = new ConsensusPress_Usage();
        $usage->handle_quota_exceeded( $result );
        $data = $usage->get_usage();
        assertSame( $data['credits_limit'], $data['credits_used'] );

    test_auto_reset_when_past_reset_date:
      purpose: "Credits reset to 0 when reset_date is in the past"
      setup: |
        Seed _cp_usage_option with:
          credits_used  = 8
          credits_limit = 10
          reset_date    = '2020-01-01 00:00:00'  <- well in the past
      assertion: |
        $usage = new ConsensusPress_Usage();
        $data  = $usage->get_usage();
        assertSame( 0, $data['credits_used'] );  // auto-reset triggered
        assertGreaterThan( strtotime( '2020-01-01' ), strtotime( $data['reset_date'] ) );

  total_new_tests: 8
  total_tests_after_sprint_5: 55

