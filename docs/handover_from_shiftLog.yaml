document_registry:

  # ---------------------------------------------------------------------------
  # SYMLINK — canonical tools, do not copy
  # ---------------------------------------------------------------------------
  symlink:
    description: |
      These live in decision_referee_clean/tools/ and are shared across
      all projects via symlinks. Symlinking ensures a single canonical
      version — any update propagates to all projects instantly.
      Never copy these files. Never edit local copies.

    items:
      - source: "decision_referee_clean/tools/"
        target: "consensuspress_production/tools"
        command: |
          ln -s /Users/mohaniyer/Library/CloudStorage/Dropbox/AI_Applications/agents/decision_referee_clean/tools \
                /Users/mohaniyer/Library/CloudStorage/Dropbox/AI_Applications/agents/consensuspress/consensuspress_production/tools
        contains:
          - "hal001_scanner.py — Four Ills structural scanner"
          - "detect_indentation_logic.py — CCS-003 indentation scan"
          - "(future) run_hallucination_sweep_v2.py — 7 Deadly Sins"
        verify: "ls -la consensuspress_production/tools/ | grep '->'"


  # ---------------------------------------------------------------------------
  # COPY AND ADAPT — project-specific, starts from ShiftLog version
  # ---------------------------------------------------------------------------
  copy_and_adapt:
    description: |
      These are project-specific files that begin as copies of the ShiftLog
      versions but require adaptation. Copy, then edit. Do not symlink.

    items:
      - source: "shiftlog/deploy_to_railway_shiftlog.sh"
        target: "consensuspress/deploy_to_railway_consensuspress.sh"
        changes_required:
          - "Line ~121: seekrates_production → consensuspress_production"
          - "All cleanup/scan paths: shiftlog_production → consensuspress_production"
          - "GitHub remote: shiftlog-saas → [consensuspress repo name]"
          - "Sprint marker file: timeline.py → [ConsensusPress Sprint N marker]"
          - "Version gate: Procfile check (keep), requirements.txt (keep)"
          - "Banner text: ShiftLog → ConsensusPress"
        verify: "bash deploy_to_railway_consensuspress.sh — Gate 0 prompt appears"

      - source: "shiftlog/shiftlog_production/tests/conftest_sprint9.py"
        target: "consensuspress_production/tests/conftest_sprint9.py"
        notes: |
          A template for sprint-specific shared fixture conftest.
          Rename and adapt fixture names and DB setup for ConsensusPress.
          This is the file whose ABSENCE caused 26 errors in ShiftLog Session 07.

      - source: "decision_referee_clean/templates/afd/script_dna_template.yaml"
        target: "consensuspress_production/docs/script_dna_template.yaml"
        notes: "Reference only — C-C uses this when writing DNA headers"


  # ---------------------------------------------------------------------------
  # CREATE NEW — ConsensusPress-specific, no ShiftLog equivalent
  # ---------------------------------------------------------------------------
  create_new:
    description: |
      These documents do not exist yet. D-C @ ConsensusPress must create them
      in Session 01 before any C-C work begins.

    items:
      - document: "consensuspress_project_instructions.yaml"
        location: "Claude Project knowledge (upload to project)"
        purpose: "The hydration document — D-C reads this at every session start"
        must_contain:
          - "Product definition and GPS prefix"
          - "Current state (sprint, test count, canonical folder location)"
          - "Canonical codebase rule (Lesson 1)"
          - "Session start protocol (ls src/, verify, then pytest)"
          - "Three-team protocol reference"
          - "Deployment pipeline reference"
          - "Phase 2 backlog"
          - "Known standing rules"
        template: "Adapt from shiftlog_project_instructions.yaml"

      - document: "consensuspress_canonical_codebase_log.yaml"
        location: "consensuspress/docs/"
        purpose: |
          Single source of truth for codebase state at each sprint boundary.
          Prevents the ShiftLog Session 07 archaeology problem.
        must_contain:
          - "sprint_n: {zip_name, test_count, key_files_present, sha256_of_zip}"
        update_rule: "D-C updates this at the END of every session, before closing"

      - document: "consensuspress_session_log.yaml"
        location: "consensuspress/bootstrap/"
        purpose: "Running session log — what was done, what is next"
        template: "One entry per session, chronological"

      - document: "deploy_to_railway_consensuspress.sh"
        location: "consensuspress/"
        purpose: "Project-specific deploy pipeline"
        source: "Adapt from deploy_to_railway_shiftlog.sh (see copy_and_adapt above)"


  # ---------------------------------------------------------------------------
  # READ-ONLY REFERENCE — do not copy, do not edit, access via symlink or upload
  # ---------------------------------------------------------------------------
  reference_only:
    description: |
      These are methodology documents that D-C reads but does not own.
      They live in decision_referee_clean/ and are the canonical versions.
      Upload to Claude Project as read-only context.

    items:
      - "four_ills_guardrail_system.yaml — The Four LLM Ills taxonomy and full guardrail stack"
      - "afd_overview.yaml — AFD principles 1-12 with lessons learned"
      - "afd_workflow.yaml — Sprint workflow, D-C deliverables D1-D7"
      - "three_team_session_protocol.yaml — Session structure, roles, hand-off rules"
      - "hallucination_prevention.yaml — Gorse analogy, HAL taxonomy"
      - "hallucination_governance.yaml — Governance rules for HAL violations"
      - "script_dna_template.yaml — DNA header template for C-C"


# =============================================================================
# SECTION 3: CONSENSUSPRESS PRODUCTION FOLDER SETUP
# =============================================================================
production_folder_setup:

  architecture_note: |
    ConsensusPress is a PHP WordPress plugin, not a Python SaaS.
    The folder structure follows WordPress plugin conventions,
    not the Python package structure used in ShiftLog.
    Lesson 6 (venv in parent) does not apply — PHP has no venv.
    Lesson 1 (one production folder) still applies absolutely.

  day_one_commands: |
    # From the agents/ parent directory:
    mkdir -p consensuspress/consensuspress_production/{includes,admin,public,templates,tests,assets}
    mkdir -p consensuspress/consensuspress_production/includes/{api,modes,delivery}
    mkdir -p consensuspress/{bootstrap,docs,config,plans}

    # WordPress plugin entry point:
    touch consensuspress/consensuspress_production/consensuspress.php
    touch consensuspress/consensuspress_production/readme.txt
    touch consensuspress/consensuspress_production/uninstall.php

    # Create tools symlink:
    ln -s /Users/mohaniyer/Library/CloudStorage/Dropbox/AI_Applications/agents/decision_referee_clean/tools \
          consensuspress_production/tools

    # Verify symlink:
    ls -la consensuspress_production/tools/ | head -3

    # Create .gitignore:
    cat > consensuspress_production/.gitignore << 'EOF'
    *.db
    *.db-journal
    .env
    .env.*
    __pycache__/
    *.pyc
    .DS_Store
    venv/
    .pytest_cache/
    *.zip
    *.tar.gz
    bootstrap/
    docs/flow_control/
    validation_reports/
    EOF

  expected_state_after_setup: |
    consensuspress/
    ├── bootstrap/                     ← IP-protected re-anchors
    ├── docs/                          ← project docs
    ├── config/                        ← config files
    ├── deploy_to_wporg_consensuspress.sh   ← WordPress.org deploy pipeline
    ├── validation_reports/
    ├── .gitignore
    ├── README.md
    └── consensuspress_production/
        ├── consensuspress.php         ← plugin entry point
        ├── readme.txt                 ← WordPress.org listing
        ├── uninstall.php
        ├── includes/
        │   ├── api/                   ← Seekrates API client
        │   ├── modes/                 ← Create and Rescue mode handlers
        │   └── delivery/              ← draft import, image sideload, Rank Math, schema
        ├── admin/                     ← wp-admin UI
        ├── public/                    ← frontend assets
        ├── templates/                 ← Blade/PHP templates
        ├── tests/                     ← PHPUnit tests
        ├── assets/                    ← CSS, JS, images
        └── tools -> decision_referee_clean/tools/  ← SYMLINK (hal001 still applies)


# =============================================================================
# SECTION 4: SESSION 01 PROTOCOL FOR CONSENSUSPRESS
# =============================================================================
session_01_protocol:

  before_any_dc_work:
    - "Upload consensuspress_project_instructions.yaml to Claude Project"
    - "Upload all reference_only docs to Claude Project (read-only context)"
    - "Confirm production folder exists and src/ is correct"
    - "Confirm tools/ symlink resolves: python tools/hal001_scanner.py --help"
    - "Confirm venv is in parent directory, not in production"

  session_01_deliverables:
    d_c_must_produce:
      - "D1: Pydantic model specifications"
      - "D2: Double-entry verification matrix"
      - "D3: API contracts"
      - "D4: Test scenarios (as pytest signatures, not YAML prose)"
      - "D5: Directory map"
      - "D6: Import specification"
      - "D7: Test infrastructure (conftest.py contents, pytest_plugins list)"
    
    note: |
      D7 is the lesson from ShiftLog. If D-C does not specify which conftest
      file holds which fixtures, C-C will define them locally in test files.
      The first full pytest run will then produce 20+ fixture errors.

  first_test_gate:
    target: "100% on first run (PHPUnit for PHP, pytest for any Python tooling)"
    if_fails: |
      Do not iterate. Stop. Identify which D-doc was incomplete.
      Fix the D-doc. Re-issue the C-C instruction. One shot only.
    rationale: |
      ShiftLog achieved 152/152 across 9 sprints with zero debugging cycles
      on application code. The fixture infrastructure gap (Lesson 4) was the
      only exception, and it was a D-C omission — not a C-C error.
    note_on_stack: |
      ConsensusPress uses PHPUnit for unit/integration tests and likely
      wp-browser/Codeception for WordPress integration tests.
      D7 (test infrastructure) must specify which test runner, which
      bootstrap file, and which WordPress test fixtures are required.


# =============================================================================
# SECTION 5: THE STANDING RULES
# =============================================================================
standing_rules:

  rule_01: "NEVER push to GitHub or deploy until all quality gates pass."
  rule_02: "No DNA headers missing. No field_contracts absent. No deprecation warnings."
  rule_03: "We do not ship junk."
  rule_04: "venv lives in parent directory. Never inside production folder."
  rule_05: "One production folder. One deploy folder. No backup clones."
  rule_06: "Three-stage deploy: test production → deploy script → test deploy → Railway."
  rule_07: "Every sprint: D1-D7 before C-C touches a keyboard."
  rule_08: "Shared fixtures live in conftest. Never in test files."
  rule_09: "The zip you submit is the zip that gets tested. Verify before attaching."
  rule_10: "Session end: update canonical_codebase_log.yaml. No exceptions."


# =============================================================================
# SECTION 6: WHAT WORKED — DO NOT CHANGE
# =============================================================================
what_worked:

  three_team_protocol: |
    D-C specifies. C-C implements. Mohan verifies.
    This produced 152 tests across 9 sprints with zero debugging cycles
    on application code. The protocol works. Follow it.

  dna_headers_21_21: |
    Full DNA compliance on all 21 src files was achieved and maintained.
    The hal001_scanner.py enforcement made this measurable.
    ConsensusPress starts with the same standard: 0 undeferred violations
    before any deployment.

  symlink_for_tools: |
    tools/ symlink means one canonical scanner, zero drift.
    Any update to hal001_scanner.py propagates to all projects instantly.
    Maintain this pattern.

  sprint_markers: |
    Using Sprint N marker files (timeline.py for Sprint 9) as a quick
    completeness test proved invaluable for codebase identification.
    ConsensusPress should establish a Sprint N marker convention from Day 1.

  deploy_gate_order: |
    Gate 4 (Railway confirmation) BEFORE Gate 3 (GitHub push).
    This is the honest gate order from Seekrates v3.8.0.
    Asking after the push is dishonest. Keep this order.


