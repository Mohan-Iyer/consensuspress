      method: "post()"
      type: "bare_array_param"
      detail: "$args is bare 'array' without PHPDoc shape"
      root_cause: true  # THIS is the origin — interface defines the contract

    - id: "HAL-001-V2"
      file: "includes/class-consensuspress-api.php"
      line: 54
      class: "ConsensusPress_WP_Transport"
      method: "post()"
      type: "bare_array_param"
      detail: "$args is bare 'array' without PHPDoc shape"
      root_cause: false  # Cascades from interface

    - id: "HAL-001-V3"
      file: "tests/class-consensuspress-mock-transport.php"
      line: 77
      class: "ConsensusPress_Mock_Transport"
      method: "post()"
      type: "bare_array_param"
      detail: "$args is bare 'array' without PHPDoc shape"
      root_cause: false  # Cascades from interface

  clean_files:
    - "consensuspress.php (4 functions, all clean)"
    - "includes/class-consensuspress-settings.php (10 methods, all clean)"
    - "admin/views/settings.php (template, no functions)"
    - "uninstall.php (procedural, no functions)"
    - "tests/bootstrap.php (stubs, clean)"
    - "tests/test-api-client.php (test class, clean)"
    - "tests/test-settings.php (test class, clean)"

  what_scanner_correctly_passed:
    - "query() return ': array' — has PHPDoc @return array{success: bool, ...}"
    - "test_connection() return ': array' — has PHPDoc @return array{success: bool, message: string}"
    - "get_usage() return ': array' — has PHPDoc @return array{used: int, limit: int, tier: string}"

  known_depth_limitation: |
    Scanner checks one level deep. The 'data' field in query() return is typed
    as 'array|null' — nested keys (consensus_score, champion, synthesis, etc.)
    are NOT shape-typed. This is a P2 enhancement for the scanner AND a D1
    design improvement for Sprint 2+.

  remediation:
    fix_count: 1  # One PHPDoc shape addition
    fix_location: "ConsensusPress_Transport_Interface::post() PHPDoc"
    fix_content: |
      /**
       * Send HTTP POST request.
       *
       * @param string $url  Endpoint URL.
       * @param array  $args {
       *     wp_remote_post compatible arguments.
       *
       *     @type int    $timeout  Request timeout in seconds.
       *     @type array  $headers  HTTP headers (Content-Type, Authorization).
       *     @type string $body     JSON-encoded request body.
       * }
       * @return array|WP_Error Response array or WP_Error on failure.
       */
    cascade_effect: "WP_Transport and Mock_Transport PHPDocs updated to match"

