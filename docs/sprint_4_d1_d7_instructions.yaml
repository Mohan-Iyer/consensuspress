# =============================================================================
# D5: TEST SCENARIOS
# =============================================================================
d5_test_scenarios:

  # ---------------------------------------------------------------------------
  # FILE: tests/test-rescue.php (NEW — 8 tests)
  # ---------------------------------------------------------------------------
  test_rescue:
    class: "ConsensusPress_Rescue_"
    fixture_used: "FIXTURE_RESCUE_SUCCESS (same shape as FIXTURE_CREATE_SUCCESS, mode='rescue')"

    tests:

      test_get_published_posts_returns_array:
        purpose: "get_published_posts() returns associative array of post_id => title"
        setup: "Seed $GLOBALS['_cp_mock_posts'] with 2 WP_Post stubs"
        assertion: "assertIsArray + assertArrayHasKey for each post ID"

      test_extract_post_content_happy_path:
        purpose: "extract_post_content() returns sanitised content for valid published post"
        setup: "_cp_post_override with post_status='publish', content='<p>Hello</p>'"
        assertion: "assertStringContainsString( '<p>Hello</p>', $result )"

      test_extract_post_content_not_published:
        purpose: "Returns empty string for draft or private posts"
        setup: "_cp_post_override with post_status='draft'"
        assertion: "assertSame( '', $result )"

      test_extract_post_content_not_found:
        purpose: "Returns empty string when post_id does not exist"
        setup: "_cp_post_override = null"
        assertion: "assertSame( '', $result )"

      test_extract_content_truncated_at_50000:
        purpose: "Content exceeding 50,000 chars is truncated"
        setup: "str_repeat( 'x', 60000 ) as post_content"
        assertion: "assertSame( 50000, strlen( $result ) )"

      test_ajax_rescue_post_happy_path:
        purpose: "AJAX handler returns job_id on success"
        setup: |
          $_POST = array( 'post_id' => 1, 'nonce' => 'test' )
          Seed valid api_key in options
          Seed mock post with publish status + content
        assertion: |
          assertSame( true, $GLOBALS['_cp_json_response']['success'] )
          assertArrayHasKey( 'job_id', $GLOBALS['_cp_json_response']['data'] )

      test_ajax_rescue_post_empty_content:
        purpose: "Returns error when post has no extractable content"
        setup: "Post exists but content is empty after extraction"
        assertion: |
          assertSame( false, $GLOBALS['_cp_json_response']['success'] )
          assertStringContainsString( 'content', $GLOBALS['_cp_json_response']['data']['message'] )

      test_ajax_rescue_post_no_api_key:
        purpose: "Returns error when API key not configured"
        setup: "Valid post but api_key = '' in options"
        assertion: "assertSame( false, $GLOBALS['_cp_json_response']['success'] )"

  # ---------------------------------------------------------------------------
  # FILE: tests/test-diff.php (NEW — 4 tests)
  # ---------------------------------------------------------------------------
  test_diff:
    class: "ConsensusPress_Diff_"

    tests:

      test_diff_view_not_shown_without_original_post_id:
        purpose: "diff.php renders empty state when _consensuspress_original_post_id not set"
        setup: "_cp_post_meta_override = array() (no original_post_id)"
        assertion: "assertStringNotContainsString( 'cp-diff-viewer', $output )"

      test_diff_view_shown_with_original_post_id:
        purpose: "diff.php renders two panes when _consensuspress_original_post_id is set"
        setup: |
          _cp_post_meta_override['_consensuspress_original_post_id'] = 42
          _cp_post_override for post_id=42 with content='<p>Original</p>'
        assertion: |
          assertStringContainsString( 'cp-diff-pane', $output )
          assertStringContainsString( 'Original', $output )

      test_original_post_id_stored_on_rescued_draft:
        purpose: "process_job() rescue branch stores _consensuspress_original_post_id"
        setup: |
          Seed rescue job via schedule_rescue_job( 42, '<p>content</p>' )
          Seed FIXTURE_RESCUE_SUCCESS as mock API response
        assertion: |
          assertSame( 42, $GLOBALS['_cp_post_meta'][$post_id]['_consensuspress_original_post_id'] )

      test_schedule_rescue_job_returns_uuid:
        purpose: "schedule_rescue_job() returns a non-empty string UUID"
        setup: "Standard bootstrap"
