# =============================================================================
# DECISIONS
# =============================================================================
decisions:

  - id: "D-04-01"
    decision: "Rescue creates a NEW draft — original post is never modified"
    rationale: |
      Non-destructive by design. User reviews diff before deciding to publish
      rescued version. Original remains published and intact.
    reversible: false

  - id: "D-04-02"
    decision: "Content truncated at 50,000 chars before API submission"
    rationale: |
      Matches consensuspress_mock_api.yaml semantic contract definition.
      Prevents oversized API payloads. 50k chars covers ~7,000 words — more
      than any realistic blog post.
    reversible: true

  - id: "D-04-03"
    decision: "Diff viewer is pure PHP side-by-side, no JS diff library"
    rationale: |
      No additional dependencies. WordPress.org reviewers flag external
      library inclusions. The visual comparison (original pane vs rescued pane)
      is sufficient for user decision-making without character-level diff highlighting.
    reversible: true

  - id: "D-04-04"
    decision: "schedule_rescue_job() added to ConsensusPress_Async, not a new class"
    rationale: |
      Rescue and Create share the same job lifecycle (pending → processing →
      complete/failed). Same transient structure, same CRON_HOOK, same
      get_job_status() polling. Separate class would duplicate infrastructure.
    reversible: false

  - id: "D-04-05"
    decision: "Rescue poll uses a SEPARATE nonce action from Create poll"
    rationale: |
      consensuspress_poll_job vs consensuspress_poll_rescue_job.
      Separate nonces prevent cross-action forgery. Consistent with how
      Create and Test Connection already use distinct nonce actions.
    reversible: false