# =============================================================================
# D1: TYPE CONTRACTS
# =============================================================================
d1_type_contracts:

  # ---------------------------------------------------------------------------
  # PART A: Python types (consensuspress_endpoints.py)
  # ---------------------------------------------------------------------------
  python_types:

    ConsensusPressRequest:
      kind: "Pydantic BaseModel"
      fields:
        - "query: str  # min_length=10, max_length=50000"
        - "mode: str   # Literal['create', 'rescue']"
        - "context: str = ''  # max_length=2000"
      rationale: "Request body for POST /api/v1/consensus"

    ConsensusPressResponse:
      kind: "Dict returned directly (not Pydantic)"
      structure: |
        {
          "success": bool,
          "data": dict   # ConsensusResult.model_dump() + {"query": str}
        }
      note: |
        data contains the full ConsensusResult model_dump() with query injected.
        No additional transformation. Existing ConsensusResult model unchanged.

    ErrorResponse:
      kind: "Dict returned via JSONResponse"
      structure: |
        {
          "success": False,
          "error": {"code": str, "message": str}
        }

  # ---------------------------------------------------------------------------
  # PART B: PHP PHPDoc shapes (post-builder)
  # ---------------------------------------------------------------------------
  php_shapes:

    api_data_input:
      description: "New shape of $api_data received by create_draft() — engine real output"
      phpdoc_shape: |
        array{
            query: string,                 // Original query (injected by endpoint)
            consensus: array{
                champion: string,          // Provider name e.g. 'openai'
                champion_score: int,       // Quality score 0-100
                convergence_percentage: float,  // Agreement % 0-100
                consensus_confidence: string,   // 'HIGH'|'MODERATE'|'LOW'
                reached: bool,
                consensus_text: string,    // Plain text synthesis
                consensus_panel: string,   // HTML panel (NOT used for blog)
                agreement_percentage: float,
            },
            providers: list<array{
                provider: string,
                answer: string,            // Raw LLM response text
                score: int,
                confidence: float,
                is_refusal: bool,
                status: string,
            }>,
            divergence: array{
                common_themes: list<string>,   // → points_of_agreement
                outliers: list<string>,        // → points_of_divergence
                personality_quotes: array,
                article_hook: string,
                theme_coverage: array,
            }|null,
            risk_analysis: array{
                assumptions: list<string>,
                failure_modes: list<string>,
                contrarian_argument: string,
                contrarian_significance: string,
                contrarian_reasoning: string,
                oracle_recommendation: string,
                validation_checklist: list<string>,
            }|null,
            correlation_id: string,
            tier: string,
        }

    generated_pipeline_output:
      description: "Return shape of generate_content_pipeline()"
      phpdoc_shape: |
        array{
            content_html: string,
            metadata: array{
                focus_keyword: string,
                seo_title: string,
                meta_description: string,
                suggested_title: string,
                categories: list<string>,
                tags: list<string>,
            },
            schema_markup: array{
                faq: array,
                article: array,
            },
            featured_image: array,  // Empty array — Unsplash deferred Sprint 8
        }

    create_draft_return:
      description: "Return shape of create_draft() — UNCHANGED from Sprint 2"
      phpdoc_shape: |
        array{
            success: bool,
            post_id: int,
            edit_url: string,
            message: string,
        }

# =============================================================================
# D2: DOUBLE-ENTRY CONTRACTS (OUTPUT/INPUT BALANCE)
# =============================================================================
d2_contracts:

  # Part A: Railway endpoint contracts

  contract_A1:
    label: "Plugin → Railway"
    output:
      producer: "ConsensusPress_API::query() in class-consensuspress-api.php"
      data: "POST body: {query, mode, context} + Bearer token header"
    input:
      consumer: "consensuspress_endpoint() in consensuspress_endpoints.py"
      reads: "ConsensusPressRequest.query, .mode, .context + Authorization header"
    balance: "BALANCED"

  contract_A2:
    label: "Railway → Plugin"
    output:
      producer: "consensuspress_endpoint() returns JSON"
      data: '{"success": true, "data": {ConsensusResult fields + "query": str}}'
    input:
      consumer: "ConsensusPress_API::query() parses $parsed['success'] and $parsed['data']"
      reads: "$parsed['success'] bool, $parsed['data'] array"
    balance: "BALANCED"

  contract_A3:
    label: "T&C gate response"
    output:
      producer: "Seekrates server — existing T&C gate in consensus_guest_endpoint pattern"
      data: '{"status": "needs_tc_acceptance", "message": "...", "tc_url": "..."}'
    input:
      consumer: "NEW: T&C handler in ConsensusPress_API::query()"
      reads: "$parsed['status'] === 'needs_tc_acceptance', $parsed['tc_url']"
    balance: "BALANCED — new handler added"

  # Part B: Plugin post-builder contracts

  contract_B1:
    label: "Async → Post-Builder (public interface UNCHANGED)"
    output:
      producer: "ConsensusPress_Async::process_job() calls $builder->create_draft($result['data'], $mode)"
      data: "$result['data'] = $parsed['data'] from API response"
    input:
      consumer: "ConsensusPress_Post_Builder::create_draft( array $api_data, string $mode )"
      reads: "New $api_data shape (D1 api_data_input)"
    balance: "BALANCED — same signature, new field paths inside"

  contract_B2:
    label: "Post-Builder → Content Pipeline"
    output:
      producer: "create_draft() calls generate_content_pipeline( $api_data )"
      data: "$api_data (full engine response)"
    input:
      consumer: "generate_content_pipeline() reads consensus, providers, divergence, query"
      reads: "All fields in D1 api_data_input shape"
    balance: "BALANCED"

  contract_B3:
    label: "Content Pipeline → WordPress"
    output:
      producer: "generate_content_pipeline() returns array (D1 generated_pipeline_output)"
      data: "content_html, metadata, schema_markup, featured_image"
    input:
      consumer: "create_draft() passes to wp_insert_post, inject_rank_math_meta, etc."
      reads: "$generated['content_html'], $generated['metadata'], $generated['schema_markup']"
    balance: "BALANCED"

  contract_B4:
    label: "Post-Builder → Meta Box (UNCHANGED from Sprint 2)"
    output:
      producer: "inject_consensus_meta() — updated field path reads but same meta keys written"
      data: "6 post_meta keys: CONSENSUS_META_KEYS"
    input:
      consumer: "ConsensusPress_Meta_Box reads same 6 keys"
      reads: "_consensuspress_score, _mode, _champion_provider, _agreement_level, _oracle_risk_level, _created_at"
    balance: "BALANCED — meta key names unchanged, source paths updated"

  contract_B5:
    label: "Mock fixture → test-post-builder.php"
    output:
      producer: "consensuspress_mock_api.yaml v2.0.0 fixture_create_success"
      data: "Updated JSON with real engine field paths"
    input:
      consumer: "test-post-builder.php fixture loading"
      reads: "Same fixture, updated field names"
    balance: "BALANCED — tests updated alongside fixture"

# =============================================================================
# D3: FORMAT CONTRACTS
# =============================================================================
d3_format_contracts:
  llm_functions_present: false
  note: |
    No LLM calls in either Part A or Part B.
    Part A calls generate_expert_panel_response_v4() which is an existing
    production function — its format contract is an existing concern.
    Part B is pure PHP string manipulation and JSON construction.

# =============================================================================
# D4: FUNCTION SPECIFICATIONS
# =============================================================================
d4_functions:

  # ===========================================================================
  # PART A: consensuspress_endpoints.py
  # ===========================================================================
  part_a_railway:

    # -------------------------------------------------------------------------
    # FILE: src/api/consensuspress_endpoints.py (NEW)
    # -------------------------------------------------------------------------

    module_structure: |
      from fastapi import APIRouter, Depends, HTTPException
      from fastapi.responses import JSONResponse
      from pydantic import BaseModel, validator
      from typing import Optional
      from src.agents.consensus_engine import generate_expert_panel_response_v4
      from src.auth.user_manager import UserManager

      router = APIRouter(prefix="/api/v1", tags=["consensuspress"])
      user_manager = UserManager()

    ConsensusPressRequest_model: |
      class ConsensusPressRequest(BaseModel):
          query: str
          mode: str = "create"          # 'create' | 'rescue'
          context: str = ""
          
          @validator('query')
          def query_min_length(cls, v):
              if len(v.strip()) < 10:
                  raise ValueError('Query must be at least 10 characters')
              return v
          
          @validator('mode')
          def mode_valid(cls, v):
              if v not in ('create', 'rescue'):
                  raise ValueError("Mode must be 'create' or 'rescue'")
              return v

    consensuspress_endpoint:
      signature: |
        @router.post("/consensus")
        async def consensuspress_endpoint(
            request: ConsensusPressRequest,
            authorization: Optional[str] = Header(None)
        ) -> dict
      purpose: "ConsensusPress plugin endpoint — authenticated, returns JSON"
      body_logic: |
        1. Validate Bearer token via user_manager.validate_session(token)
           - Extract token from 'Bearer {token}' header
           - If no header or invalid: raise HTTPException(401)
        2. Check T&C acceptance via check_tc_acceptance(user_email)
           - If not accepted: return JSONResponse(200, {"status": "needs_tc_acceptance",
             "message": "Please accept Terms & Conditions", "tc_url": "..."})
        3. Check tier limits via check_tier_limits(user_email, get_queries_today(user_email))
           - If exceeded: raise HTTPException(402, detail=message)
        4. Call: result = await generate_expert_panel_response_v4(
               query=request.query,
               providers=['openai', 'claude', 'gemini', 'mistral', 'cohere'],
               tier=user_tier
           )
        5. data = result.model_dump()
        6. data['query'] = request.query      # inject query — not in Pydantic model
        7. data['mode'] = request.mode        # inject mode for plugin context
        8. return {"success": True, "data": data}
      error_handling:
        401: "Invalid/missing Bearer token"
        402: "Tier limit exceeded — HTTPException with tier/limit in detail"
        422: "Pydantic validation error (FastAPI auto-handles)"
        500: "Engine failure — catch Exception, log, raise HTTPException(500)"
      phpdoc: "Python: standard FastAPI docstring"
      note: |
        T&C gate uses same check_tc_acceptance() function as consensus_guest_endpoint.
        Import it from the same location as in auth_endpoints.py.
        Tier lookup uses get_user_tier_by_email(user_email) — same import.
        ALL imports must come from existing auth_endpoints.py import block.
        DO NOT invent new imports or functions.

    main_py_modification: |
      In src/server/main.py, after existing router includes, ADD:
        from src.api.consensuspress_endpoints import router as consensuspress_router
        app.include_router(consensuspress_router)
      ONE import line + ONE include_router line. Nothing else changed.

    # -------------------------------------------------------------------------
    # PATCH: class-consensuspress-api.php (T&C gate)
    # -------------------------------------------------------------------------
    api_php_patch:
      file: "includes/class-consensuspress-api.php"
      location: "In query() method, AFTER $status and $parsed are set, BEFORE existing 401 check"
      insert: |
        // T&C gate — HTTP 200 with needs_tc_acceptance body (not an error)
        if ( 200 === $status && isset( $parsed['status'] ) && 'needs_tc_acceptance' === $parsed['status'] ) {
            return array(
                'success'     => false,
                'data'        => null,
                'error'       => array(
                    'code'    => 'needs_tc_acceptance',
                    'message' => 'Please accept Seekrates AI Terms & Conditions to use ConsensusPress.',
                    'tc_url'  => esc_url_raw( $parsed['tc_url'] ?? 'https://seekrates-ai.com/website-t-c/' ),
                ),
                'http_status' => 200,
            );
        }
      position_anchor: |
        Insert AFTER this line:
          $parsed = json_decode( $response['body'] ?? '', true );
        Insert BEFORE this block:
          if ( 401 === $status ) {

  # ===========================================================================
  # PART B: class-consensuspress-post-builder.php v2.0.0
  # ===========================================================================
  part_b_post_builder:

    # -------------------------------------------------------------------------
    # validate_api_data — UPDATED required keys
    # -------------------------------------------------------------------------
    validate_api_data:
      signature: "private function validate_api_data( array $api_data ): bool"
      purpose: "Check all required top-level keys exist — updated for real engine shape"
      body_logic: |
        $required_top = array( 'consensus', 'providers', 'correlation_id' );
        foreach ( $required_top as $key ) {
            if ( ! array_key_exists( $key, $api_data ) ) { return false; }
        }
        // Validate consensus sub-keys
        $required_consensus = array( 'champion', 'champion_score', 'convergence_percentage',
                                     'consensus_confidence', 'reached', 'consensus_text' );
        foreach ( $required_consensus as $key ) {
            if ( ! isset( $api_data['consensus'][ $key ] ) ) { return false; }
        }
        // Validate providers is non-empty array
        if ( ! is_array( $api_data['providers'] ) || empty( $api_data['providers'] ) ) {
            return false;
        }
        return true;

    # -------------------------------------------------------------------------
    # generate_content_pipeline — NEW master content generation method
    # -------------------------------------------------------------------------
    generate_content_pipeline:
      signature: "private function generate_content_pipeline( array $api_data ): array"
      purpose: |
        PHP equivalent of seekrates_publisher content_formatter.py + seo_optimizer.py.
        Generates ALL content from raw engine data. No LLM calls.
      return_type: "array (see D1 generated_pipeline_output)"
      body_logic: |
        $query       = sanitize_text_field( $api_data['query'] ?? '' );
        $synthesis   = $api_data['consensus']['consensus_text'] ?? '';
        $consensus_pct = (float) ( $api_data['consensus']['convergence_percentage'] ?? 0 );
        $champion_name = sanitize_text_field( $api_data['consensus']['champion'] ?? '' );
        $champion_score = (int) ( $api_data['consensus']['champion_score'] ?? 0 );
        $agreement_level = sanitize_text_field( $api_data['consensus']['consensus_confidence'] ?? 'LOW' );
        $agent_count = count( $api_data['providers'] ?? array() );

        // --- Derive SEO metadata ---
        $focus_keyword   = $this->extract_focus_keyword( $query );
        $seo_title       = $this->generate_seo_title( $focus_keyword );
        $meta_description = $this->generate_meta_description( $synthesis, $consensus_pct, $focus_keyword );
        $suggested_title = $seo_title;

        // --- Content pipeline ---
        $paragraphs    = $this->chunk_paragraphs( $synthesis );
        $champion_answer = $this->get_champion_answer( $api_data['providers'], $champion_name );
        $insights      = $this->extract_insights( $synthesis, $paragraphs );
        $agreement_pts = array_slice( $api_data['divergence']['common_themes'] ?? array(), 0, 5 );
        $divergence_pts = array_slice( $api_data['divergence']['outliers'] ?? array(), 0, 3 );

        // --- Schema ---
        $faq_schema     = $this->generate_faq_schema( $query, $synthesis, $focus_keyword );
        $article_schema = $this->generate_article_schema( $seo_title, $meta_description );

        // --- Avg confidence ---
        $confidences = array_column( $api_data['providers'], 'confidence' );
        $avg_confidence = ! empty( $confidences ) ? array_sum( $confidences ) / count( $confidences ) : 0.0;

        // --- Build HTML ---
        $content_html = $this->build_content_html( array(
            'focus_keyword'      => $focus_keyword,
            'query'              => $query,
            'consensus_pct'      => round( $consensus_pct ),
            'agreement_level'    => $agreement_level,
            'agent_count'        => $agent_count,
            'avg_confidence'     => round( $avg_confidence * 100 ),
            'champion_name'      => strtoupper( $champion_name ),
            'champion_score'     => $champion_score,
            'champion_answer'    => $this->convert_plain_to_html_paragraphs( $champion_answer ),
            'paragraphs'         => $paragraphs,
            'insights'           => $insights,
            'points_agreement'   => $agreement_pts,
            'points_divergence'  => $divergence_pts,
            'category'           => 'ai-insights',
            'post_date'          => date( 'F j, Y' ),
            'correlation_id'     => sanitize_text_field( $api_data['correlation_id'] ?? '' ),
        ) );

        // --- Tags from query keywords ---
        $tags = array_filter( explode( ' ', $focus_keyword ) );
        $tags[] = 'ai-consensus';
        $tags[] = 'seekrates';

        return array(
            'content_html'  => $content_html,
            'metadata'      => array(
                'focus_keyword'    => $focus_keyword,
                'seo_title'        => $seo_title,
                'meta_description' => $meta_description,
                'suggested_title'  => $suggested_title,
                'categories'       => array( 'ai-insights' ),
                'tags'             => array_values( array_unique( $tags ) ),
            ),
            'schema_markup' => array(
                'faq'     => $faq_schema,
                'article' => $article_schema,
            ),
            'featured_image' => array(),   // Unsplash deferred Sprint 8
        );

    # -------------------------------------------------------------------------
    # extract_focus_keyword
    # -------------------------------------------------------------------------
    extract_focus_keyword:
      signature: "private function extract_focus_keyword( string $query ): string"
      purpose: "Extract 2-3 word focus keyword from query by frequency + stop-word filter"
      body_logic: |
        $stop_words = array(
            'a','an','the','and','or','but','in','on','at','to','for',
            'of','with','by','from','as','is','was','are','were','be',
            'what','where','when','how','why','which','who','will','can',
            'should','would','could','do','does','did','has','have','had',
            'most','best','top','key','effective','important','about','that',
        );
        // Lowercase, strip punctuation, split to words
        $clean = preg_replace('/[^\w\s]/', ' ', strtolower( $query ) );
        $words = array_filter( explode( ' ', $clean ) );
        // Remove stop words
        $content_words = array_values( array_filter( $words, function( $w ) use ( $stop_words ) {
            return strlen( $w ) > 3 && ! in_array( $w, $stop_words, true );
        } ) );
        // Return first 3 unique content words joined
        $unique = array_slice( array_unique( $content_words ), 0, 3 );
        return implode( ' ', $unique ) ?: substr( $query, 0, 30 );

    # -------------------------------------------------------------------------
    # generate_seo_title
    # -------------------------------------------------------------------------
    generate_seo_title:
      signature: "private function generate_seo_title( string $focus_keyword ): string"
      body_logic: |
        $title = ucwords( $focus_keyword ) . ': 5 AIs Reveal Key Insights';
        if ( strlen( $title ) > 60 ) {
            $title = ucwords( $focus_keyword ) . ': AI Consensus Insights';
        }
        if ( strlen( $title ) > 60 ) {
            $title = ucwords( $focus_keyword );
        }
        return $title;

    # -------------------------------------------------------------------------
    # generate_meta_description
    # -------------------------------------------------------------------------
    generate_meta_description:
      signature: "private function generate_meta_description( string $synthesis, float $consensus_pct, string $focus_keyword ): string"
      body_logic: |
        // Take first sentence of synthesis
        $sentences = preg_split( '/(?<=[.!?])\s+/', $synthesis, 2 );
        $first = trim( $sentences[0] ?? $synthesis );
        $prefix = ucwords( $focus_keyword ) . ' — ' . round( $consensus_pct ) . '% AI consensus: ';
        $desc = $prefix . $first;
        if ( strlen( $desc ) > 155 ) {
            $desc = substr( $desc, 0, 152 ) . '...';
        }
        return $desc;

    # -------------------------------------------------------------------------
    # chunk_paragraphs
    # -------------------------------------------------------------------------
    chunk_paragraphs:
      signature: "private function chunk_paragraphs( string $text, int $target_words = 50 ): array"
      purpose: "Split synthesis text into 40-60 word paragraphs (GEO/LLMO optimisation)"
      body_logic: |
        $sentences = preg_split( '/(?<=[.!?])\s+/', $text );
        $sentences = array_filter( array_map( 'trim', $sentences ) );
        $chunks = array();
        $current = array();
        $current_words = 0;
        foreach ( $sentences as $sentence ) {
            $word_count = str_word_count( $sentence );
            if ( $current_words >= 40 && ( $current_words + $word_count ) > 65 ) {
                $chunks[] = implode( ' ', $current );
                $current = array( $sentence );
                $current_words = $word_count;
            } else {
                $current[] = $sentence;
                $current_words += $word_count;
            }
        }
        if ( ! empty( $current ) ) {
            $chunks[] = implode( ' ', $current );
        }
        return array_values( array_filter( $chunks ) );

    # -------------------------------------------------------------------------
    # extract_insights
    # -------------------------------------------------------------------------
    extract_insights:
      signature: "private function extract_insights( string $synthesis, array $paragraphs ): array"
      purpose: "Extract 3-5 key insight strings from synthesis for the Key Insights box"
      body_logic: |
        // Look for sentences containing signal words
        $signals = array( 'key', 'important', 'critical', 'must', 'essential',
                          'recommend', 'should', 'ensure', 'requires' );
        $insights = array();
        $sentences = preg_split( '/(?<=[.!?])\s+/', $synthesis );
        foreach ( $sentences as $sentence ) {
            $lower = strtolower( $sentence );
            foreach ( $signals as $signal ) {
                if ( strpos( $lower, $signal ) !== false ) {
                    $insights[] = trim( $sentence );
                    break;
                }
            }
            if ( count( $insights ) >= 5 ) { break; }
        }
        // Fallback: use first sentences of paragraphs
        if ( count( $insights ) < 3 ) {
            foreach ( $paragraphs as $p ) {
                $first = preg_split( '/(?<=[.!?])\s+/', $p, 2 );
                if ( ! empty( $first[0] ) ) { $insights[] = trim( $first[0] ); }
                if ( count( $insights ) >= 3 ) { break; }
            }
        }
        return array_slice( array_unique( $insights ), 0, 5 );

    # -------------------------------------------------------------------------
    # get_champion_answer
    # -------------------------------------------------------------------------
    get_champion_answer:
      signature: "private function get_champion_answer( array $providers, string $champion_name ): string"
      body_logic: |
        foreach ( $providers as $p ) {
            if ( isset( $p['provider'] ) && $p['provider'] === $champion_name
                 && ! empty( $p['answer'] ) ) {
                return (string) $p['answer'];
            }
        }
        // Fallback: return first non-refusal answer
        foreach ( $providers as $p ) {
            if ( empty( $p['is_refusal'] ) && ! empty( $p['answer'] ) ) {
                return (string) $p['answer'];
            }
        }
        return '';

    # -------------------------------------------------------------------------
    # convert_plain_to_html_paragraphs
    # -------------------------------------------------------------------------
    convert_plain_to_html_paragraphs:
      signature: "private function convert_plain_to_html_paragraphs( string $text ): string"
      purpose: "Wrap double-newline-separated text in <p> tags. Light markdown: **bold** → <strong>."
      body_logic: |
        if ( empty( $text ) ) { return ''; }
        // Bold markdown
        $text = preg_replace( '/\*\*(.+?)\*\*/', '<strong>$1</strong>', $text );
        // Split on double newlines
        $blocks = preg_split( '/\n{2,}/', $text );
        $output = '';
        foreach ( $blocks as $block ) {
            $block = trim( $block );
            if ( ! empty( $block ) ) {
                $output .= '<p style="line-height:1.7;margin-bottom:16px;font-size:16px;color:#333;">'
                        . nl2br( esc_html( $block ) ) . '</p>';
            }
        }
        return $output;

    # -------------------------------------------------------------------------
    # generate_faq_schema
    # -------------------------------------------------------------------------
    generate_faq_schema:
      signature: "private function generate_faq_schema( string $query, string $synthesis, string $focus_keyword ): array"
      purpose: "Build FAQPage JSON-LD schema (increases AI citation likelihood)"
      body_logic: |
        // Take first 155 chars of synthesis as answer text (schema answer length)
        $answer_text = strlen( $synthesis ) > 155 ? substr( $synthesis, 0, 152 ) . '...' : $synthesis;
        return array(
            '@context'   => 'https://schema.org',
            '@type'      => 'FAQPage',
            'mainEntity' => array(
                array(
                    '@type'          => 'Question',
                    'name'           => sanitize_text_field( $query ),
                    'acceptedAnswer' => array(
                        '@type' => 'Answer',
                        'text'  => sanitize_text_field( $answer_text ),
                    ),
                ),
                array(
                    '@type'          => 'Question',
                    'name'           => 'What do AI models say about ' . sanitize_text_field( $focus_keyword ) . '?',
                    'acceptedAnswer' => array(
                        '@type' => 'Answer',
                        'text'  => 'According to Seekrates AI consensus analysis, ' . sanitize_text_field( $answer_text ),
                    ),
                ),
            ),
        );

    # -------------------------------------------------------------------------
    # generate_article_schema
    # -------------------------------------------------------------------------
    generate_article_schema:
      signature: "private function generate_article_schema( string $seo_title, string $meta_description ): array"
      body_logic: |
        return array(
            '@context'    => 'https://schema.org',
            '@type'       => 'Article',
            'headline'    => sanitize_text_field( $seo_title ),
            'description' => sanitize_text_field( $meta_description ),
            'author'      => array( '@type' => 'Organization', 'name' => 'Seekrates AI' ),
            'publisher'   => array(
                '@type' => 'Organization',
                'name'  => get_bloginfo( 'name' ),
                'url'   => home_url(),
            ),
            'datePublished' => date( 'c' ),   // ISO 8601
        );

    # -------------------------------------------------------------------------
    # build_content_html
    # -------------------------------------------------------------------------
    build_content_html:
      signature: "private function build_content_html( array $vars ): string"
      purpose: |
        PHP equivalent of seekrates_blog_post_template.html v6.0.0.
        Constructs full blog post HTML from $vars array.
        Elementor shortcodes STRIPPED (customer sites — not seekrates-ai.com).
        Internal links use home_url() not seekrates-ai.com.
        All output properly escaped.
      body_logic: |
        Extract and escape all vars:
          $fk  = esc_html( $vars['focus_keyword'] )
          $q   = esc_html( $vars['query'] )
          $pct = (int) $vars['consensus_pct']
          $al  = esc_html( $vars['agreement_level'] )
          // ... all vars escaped before use in HTML

        HTML structure (matches template v6.0.0 minus Elementor shortcodes):
          1. <article class="seekrates-consensus-post">
          2. Intro paragraph with $fk in <strong>
          3. Consensus badge (dark blue, shows $pct%)
          4. "The Question Asked" block with $q
          5. Metrics table: agent_count | avg_confidence | champion_score | agreement_level
          6. H2 "What 5 Leading AI Models Say About {$fk}" (id="consensus")
          7. Paragraphs loop (each in <p>)
          8. Key Insights box (if $insights non-empty)
          9. Champion response box (H2 id="champion", shows $champion_answer)
          10. Points of Agreement (if non-empty)
          11. Points of Divergence (if non-empty)
          12. "Why {$fk} Matters" section (static copy + internal link via home_url())
          13. Pull quote blockquote
          14. "Next Steps" section
          15. Champion info paragraph
          16. Internal link: home_url('/category/ai-insights/')
          17. Methodology footer (small text)
          18. </article>
        
        Return: wp_kses_post( $html )  // Applied before return

      note: |
        DO NOT include Elementor shortcodes [elementor-template id="..."].
        DO NOT include eggC() JavaScript.
        DO NOT include seekrates-ai.com URLs — use home_url() or esc_url( home_url('/...') ).
        Agreement level colour: HIGH=#d4edda MODERATE=#fff3cd LOW=#f8d7da (matches template exactly).

    # -------------------------------------------------------------------------
    # inject_consensus_meta — UPDATED field paths
    # -------------------------------------------------------------------------
    inject_consensus_meta:
      signature: "private function inject_consensus_meta( int $post_id, array $api_data, string $mode ): void"
      purpose: "Store consensus metadata for meta box — UPDATED for new field paths"
      body_logic: |
        update_post_meta( $post_id, self::CONSENSUS_META_KEYS['score'],
            (float) ( $api_data['consensus']['convergence_percentage'] ?? 0.0 ) );
        update_post_meta( $post_id, self::CONSENSUS_META_KEYS['mode'],
            sanitize_text_field( $mode ) );
        update_post_meta( $post_id, self::CONSENSUS_META_KEYS['champion_provider'],
            sanitize_text_field( $api_data['consensus']['champion'] ?? '' ) );
        update_post_meta( $post_id, self::CONSENSUS_META_KEYS['agreement_level'],
            sanitize_text_field( $api_data['consensus']['consensus_confidence'] ?? '' ) );
        // risk_analysis may be null (seeker/acolyte tiers) — graceful default
        $risk_recommendation = $api_data['risk_analysis']['oracle_recommendation'] ?? '';
        $risk_level = empty( $risk_recommendation ) ? '' :
            ( str_contains( strtolower( $risk_recommendation ), 'caution' ) ? 'medium' : 'low' );
        update_post_meta( $post_id, self::CONSENSUS_META_KEYS['oracle_risk_level'],
            sanitize_text_field( $risk_level ) );
        update_post_meta( $post_id, self::CONSENSUS_META_KEYS['created_at'],
            current_time( 'mysql' ) );
      note: |
        _consensuspress_score now reads from consensus.convergence_percentage (float 0-100).
        _consensuspress_champion_provider now reads from consensus.champion (string).
        _consensuspress_agreement_level now reads from consensus.consensus_confidence (HIGH|MODERATE|LOW).
        Meta box reads same six keys — no change to meta box code.

    # -------------------------------------------------------------------------
    # create_draft — UPDATED orchestration (public signature unchanged)
    # -------------------------------------------------------------------------
    create_draft:
      signature: "public function create_draft( array $api_data, string $mode = 'create' ): array"
      purpose: "Master method — updated to call generate_content_pipeline() for content"
      body_logic: |
        1. if ( ! $this->validate_api_data( $api_data ) ) {
               return array( 'success' => false, 'post_id' => 0,
                             'edit_url' => '', 'message' => 'Invalid API response structure.' );
           }
        2. // Generate all content, metadata, schema from raw engine data
           $generated = $this->generate_content_pipeline( $api_data );

        3. // Build post title
           $post_title = sanitize_text_field( $generated['metadata']['suggested_title'] );

        4. // Build post args
           $post_args = array(
               'post_title'   => $post_title,
               'post_content' => wp_kses_post( $generated['content_html'] ),
               'post_status'  => 'draft',
               'post_type'    => 'post',
               'post_author'  => get_current_user_id(),
           );

        5. $post_id = wp_insert_post( $post_args, true );
           if ( is_wp_error( $post_id ) ) {
               return array( 'success' => false, 'post_id' => 0,
                             'edit_url' => '', 'message' => $post_id->get_error_message() );
           }

        6. $this->inject_rank_math_meta( $post_id, $generated['metadata'], $generated['schema_markup'] );
        7. $this->inject_consensus_meta( $post_id, $api_data, $mode );
        8. // featured_image is empty array in Sprint 7 — sideload skipped gracefully
           if ( ! empty( $generated['featured_image']['url'] ) ) {
               $this->sideload_featured_image( $post_id, $generated['featured_image'] );
           }
        9. $this->assign_taxonomy_terms( $post_id, $generated['metadata'] );

        10. return array(
                'success'  => true,
                'post_id'  => (int) $post_id,
                'edit_url' => (string) get_edit_post_link( $post_id, 'raw' ),
                'message'  => 'Draft created successfully.',
            );

