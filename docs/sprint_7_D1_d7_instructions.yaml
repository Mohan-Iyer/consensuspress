# =============================================================================
# SPRINT 7: RAILWAY ENDPOINT + POST-BUILDER CONTENT PIPELINE — D1-D7 SPEC
# =============================================================================
# Project:  ConsensusPress by Seekrates
# Sprint:   7 (new — inserted before WordPress.org packaging sprint)
# Author:   D-C (Session 08)
# Date:     2026-03-03
# Method:   AFD v1.3.0
# HLR ref:  Build Sequence Steps 1 (server endpoint) + 4-5 (plugin post-builder)
# =============================================================================
# SCOPE:
#   Part A — Railway FastAPI Endpoint (Python)
#     New file: src/api/consensuspress_endpoints.py
#     One line:  src/server/main.py (router registration)
#     Patch:     class-consensuspress-api.php (T&C gate handling)
#
#   Part B — Plugin Post-Builder Content Pipeline (PHP)
#     Revised:   class-consensuspress-post-builder.php v2.0.0
#     Purpose:   Accept real engine ConsensusResult field structure.
#                Generate content_html, metadata, schema in PHP (replaces
#                seekrates_publisher content_formatter.py + seo_optimizer.py).
#     Revised:   consensuspress_mock_api.yaml v2.0.0 (field names updated)
#
# ARCHITECTURE DECISIONS (from Session 08 analysis):
#   D-08-03: Synchronous JSON (Option A) — plugin holds connection, server returns
#   D-08-04: Auth via user_manager.py session token (Option A)
#   D-08-05: T&C gate handled in plugin, not bypassed server-side
#   D-08-06: All content production (HTML/SEO/schema) done in PHP post-builder
#   D-08-07: Unsplash fetch deferred — Sprint 7 post-builder sets $featured_image=[]
#            gracefully (sideload_featured_image is preserved, just not called)
#
# ROOT CAUSE OF THIS SPRINT (HAL-008 resolution):
#   consensuspress_mock_api.yaml v1.0.0 assumed server returns pre-built
#   content_html, metadata.focus_keyword, schema_markup, featured_image.url.
#   Actual generate_expert_panel_response_v4() returns raw consensus analysis
#   only. seekrates_publisher was the content production pipeline.
#   ConsensusPress replaces seekrates_publisher — so the plugin does the work.
#
# KEY FIELD MAPPING (engine model_dump() → PHP $api_data):
#   consensus.convergence_percentage → consensus score %
#   consensus.consensus_confidence   → HIGH|MODERATE|LOW
#   consensus.champion               → champion provider name
#   consensus.champion_score         → champion quality score
#   consensus.consensus_text         → raw synthesis text (basis for paragraphs)
#   consensus.reached                → bool
#   providers[].provider             → provider name
#   providers[].answer               → raw LLM response text
#   providers[].score                → quality score
#   providers[].confidence           → float
#   providers[].is_refusal           → bool
#   divergence.common_themes[]       → points_of_agreement equivalent
#   divergence.outliers[]            → points_of_divergence equivalent
#   risk_analysis                    → Oracle tier only (may be null)
#   query                            → added by endpoint to data dict (not in Pydantic model)
#
# OUT OF SCOPE:
#   WordPress.org packaging (Sprint 8)
#   Unsplash featured image fetch (Sprint 8 enhancement)
# =============================================================================

version: "1.0.0"

