d1_type_contracts:

  vocabulary_constraint: |
    C-C MUST use ONLY types defined here.
    TYPE-B deferrals: add HAL_DEFER comment above the annotation line only.
    Do NOT change TYPE-B annotations. Do NOT invent new types.

  in_sprint_violations: 10
  type_b_violations:    6

  new_types:

    - name: "CustomerRecord"
      kind: "TypedDict"
      total: true
      purpose: |
        Return type for get_customer_by_email.
        Annotation becomes: Optional[CustomerRecord]
        Represents a row from the customers table.
      fields:
        - name: "customer_id"
          type: "str"
          description: "Internal DB customer ID"
        - name: "stripe_customer_id"
          type: "str"
          description: "Stripe customer ID (cus_xxx)"
        - name: "tier"
          type: "str"
          description: "Current tier name: seeker | acolyte | oracle | sage"

    - name: "CustomerResult"
      kind: "TypedDict"
      total: true
      purpose: |
        Return type for get_or_create_customer.
        Extends CustomerRecord fields with is_new flag.
      fields:
        - name: "customer_id"
          type: "str"
        - name: "stripe_customer_id"
          type: "str"
        - name: "tier"
          type: "str"
        - name: "is_new"
          type: "bool"
          description: "True if customer was created in this call"

    - name: "UserTierInfo"
      kind: "TypedDict"
      total: true
      purpose: |
        Return type for get_user_tier_by_email.
        Contains tier name, code, and all limit fields.
      fields:
        - name: "tier_name"
          type: "str"
          description: "Tier name: seeker | acolyte | oracle | sage"
        - name: "tier_code"
          type: "str"
          description: "Tier code: SEK | AKO | ORA | SAG"
        - name: "max_tokens"
          type: "int"
          description: "Maps to query_length_chars from TIER_CONFIG"
        - name: "queries_per_day"
          type: "int"
          description: "Daily query limit (0 = unlimited)"
        - name: "queries_per_month"
          type: "int"
          description: "Monthly query limit"
        - name: "query_length_chars"
          type: "int"
          description: "Max query length in characters"

    - name: "TierConfig"
      kind: "TypedDict"
      total: false
      purpose: |
        Return type for get_tier_limits.
        Mirrors TIER_CONFIG dict values.
        total=False: queries_per_day and price_env are None on free tier.
      fields:
        - name: "code"
          type: "str"
          description: "Tier code: SEK | AKO | ORA | SAG"
        - name: "price_env"
          type: "Optional[str]"
          description: "Stripe price env var name. None for free tier."
        - name: "queries_per_month"
          type: "int"
        - name: "queries_per_day"
          type: "Optional[int]"
          description: "None = unlimited (paid tiers)"
        - name: "query_length_chars"
          type: "int"

    - name: "WebhookHandlerResult"
      kind: "TypedDict"
      total: false
      purpose: |
        Return type for handle_webhook and all _handle_* functions.
        total=False: fields vary per handler path.
        Covers both handled paths (all handler functions) and
        the unhandled path in handle_webhook.
      fields:
        - name: "status"
          type: "str"
          always_present: true
          values: "'handled' | 'unhandled'"
        - name: "action"
          type: "str"
          always_present: false
          description: "Present on handled paths only"
        - name: "type"
          type: "str"
          always_present: false
          description: "Present on unhandled path only — Stripe event type"
        - name: "stripe_customer_id"
          type: "str"
          always_present: false
        - name: "stripe_subscription_id"
          type: "str"
          always_present: false
        - name: "tier"
          type: "str"
          always_present: false
        - name: "db_updated"
          type: "bool"
          always_present: false
        - name: "subscription_upserted"
          type: "bool"
          always_present: false
        - name: "subscription_status"
          type: "str"
          always_present: false
          description: "_handle_subscription_updated only"
        - name: "new_tier"
          type: "str"
          always_present: false
          description: "_handle_subscription_deleted only"
        - name: "customer_id"
          type: "str"
          always_present: false
          description: "_handle_payment_succeeded only"

  deferred:

    - violation_line: 598
