        all_types: "str"

    - id: "HP-002"
      name: "customer_result_extends_with_is_new"
      pytest: "test_customer_result_extends_with_is_new"
      description: |
        CustomerResult has 4 fields: customer_id, stripe_customer_id,
        tier (str), is_new (bool).
      given:
        TypedDict: "CustomerResult"
      expected:
        fields: ["customer_id", "stripe_customer_id", "tier", "is_new"]

    - id: "HP-003"
      name: "user_tier_info_has_six_fields"
      pytest: "test_user_tier_info_has_six_fields"
      description: |
        UserTierInfo has 6 fields covering all TIER_CONFIG limit keys.
      given:
        TypedDict: "UserTierInfo"
      expected:
        fields: ["tier_name","tier_code","max_tokens","queries_per_day",
                 "queries_per_month","query_length_chars"]

    - id: "HP-004"
      name: "webhook_handler_result_covers_all_handler_fields"
      pytest: "test_webhook_handler_result_covers_all_handler_fields"
      description: |
        WebhookHandlerResult (total=False) carries status + all optional
        fields from all 5 handler return shapes.
      given:
        TypedDict: "WebhookHandlerResult"
        test_cases:
          - "handled path: status=handled, action=subscription_created"
          - "unhandled path: status=unhandled, type=unknown.event"
      expected:
        required_in_all: ["status"]
        optional_fields_present: ["action","type","stripe_customer_id",
                                  "stripe_subscription_id","tier",
                                  "db_updated","subscription_upserted"]

    - id: "EH-001"
      name: "type_b_deferrals_have_hal_defer_comments"
      pytest: "test_type_b_deferrals_have_hal_defer_comments"
