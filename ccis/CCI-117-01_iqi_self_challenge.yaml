# =============================================================================
# PRECISE CHANGE SPECIFICATION
# =============================================================================
change_spec:

  change_1:
    what: "Add check_iqi() function"
    where: "After check_d6() function, before main() — approximately line 433"
    signature: "def check_iqi(cci: dict[str, Any], result: LintResult) -> None"
    logic: |
      iqi = cci.get("iqi_self_challenge")

      if iqi is None:
          result.fail("IQI", "iqi_self_challenge block is missing — D-C must complete before issuing to C-C")
          return

      REQUIRED_QUESTIONS = ["circularity", "evidence", "omission"]
      SHORT_ANSWER_THRESHOLD = 10

      all_ok = True
      for q in REQUIRED_QUESTIONS:
          block = iqi.get(q)
          if block is None:
              result.fail("IQI", f"iqi_self_challenge.{q} key is missing")
              all_ok = False
              continue
          answer = block.get("answer") if isinstance(block, dict) else None
          if not answer:
              result.fail("IQI", f"iqi_self_challenge.{q}.answer is empty or missing")
              all_ok = False
          elif len(str(answer).strip()) < SHORT_ANSWER_THRESHOLD:
              result.warn("IQI", f"iqi_self_challenge.{q}.answer is very short — confirm not a stub")
          else:
              result.ok(f"IQI {q}: answered ({len(str(answer).strip())} chars)")

  change_2:
    what: "Wire check_iqi into main()"
    where: "In main(), after check_d6(cci, result) call, before result printing"
    insertion: "    check_iqi(cci, result)"

  change_3:
    what: "Version bump in DNA header"
    where: "Line 9 of DNA header (# version: 1.0.0)"
    old: "# version:       1.0.0"
    new: "# version:       1.0.2"

  change_4:
    what: "Version bump in print statement in main()"
    where: "main() — the print line showing spec_lint version"
    old: "print(f\"spec_lint.py v1.0.0 — CCI Specification Validator\")"
    new: "print(f\"spec_lint.py v1.0.2 — CCI Specification Validator\")"

