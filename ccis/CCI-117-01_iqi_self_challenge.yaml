# =============================================================================
# CONTEXT
# =============================================================================
context: |
  spec_lint.py v1.0.0 validates CCI structure but does not enforce the IQI
  self-challenge block. The IQI self-challenge is a mandatory D-C quality gate:
  before any CCI is issued to C-C, D-C must answer three questions that prevent
  the most common LLM failure modes (self-certification circularity, ungrounded
  assertions, silent omissions).

  v1.0.2 adds:
    1. check_iqi() — new check function, enforces iqi_self_challenge block
    2. main() — wired to call check_iqi()
    3. version string — bumped to 1.0.2 in DNA header and print statement

  The iqi_self_challenge block structure in a CCI:

    iqi_self_challenge:
      circularity:
        question: "Is D-C certifying its own work without independent verification?"
        answer: "[D-C fills this in — non-empty, non-placeholder]"
      evidence:
        question: "Does every D0/D1/D2/D3 claim have machine-verifiable backing?"
        answer: "[D-C fills this in — non-empty, non-placeholder]"
      omission:
        question: "What has been left out that could cause C-C to fail or gap-fill?"
        answer: "[D-C fills this in — non-empty, non-placeholder]"

  spec_lint FAILS (exit 1) if:
    - iqi_self_challenge block is absent entirely
    - Any of the three questions is missing
    - Any answer is empty, None, or still a placeholder

  spec_lint WARNS (but does not fail) if:
    - An answer is very short (< 10 chars) — may be a stub

# =============================================================================
# IQI SELF-CHALLENGE (mandatory on this CCI itself)
# =============================================================================
iqi_self_challenge:
  circularity:
    question: "Is D-C certifying its own work without independent verification?"
    answer: >
      spec_lint is a tool, not a verdict. It runs deterministic checks on YAML
      structure. The IQI block is enforced mechanically — C-C cannot skip it
      and spec_lint cannot pass a CCI without it. The check itself is not
      self-certifying: it either finds the block or it does not.
  evidence:
    question: "Does every D0/D1/D2/D3 claim have machine-verifiable backing?"
    answer: >
      D0 is machine-generated from H-SEEK-03 inventory_file.py output
      (SHA256: 3ceccd446230b5c9f2c70b31c1e38e0fc3914e6f4b3e096bc1a0ee1c55d64756).
      17 functions confirmed. D1 has zero new types — check_iqi uses only
      LintResult (existing) and dict/str primitives. D2 flows are verified:
      check_iqi() reads cci dict and writes to result — same pattern as all
      other check_* functions. D3 not applicable — no LLM calls.
  omission:
    question: "What has been left out that could cause C-C to fail or gap-fill?"
    answer: >
      One deliberate scope boundary: spec_lint does NOT check the content
      quality of IQI answers — only that they exist and are non-empty. Semantic
      quality assessment is a D-C/human responsibility. C-C cannot gap-fill here
      because the check is purely structural (key present + value non-empty).
      No ambiguity introduced.

