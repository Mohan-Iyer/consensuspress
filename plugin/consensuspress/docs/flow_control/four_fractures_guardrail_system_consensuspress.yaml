# =============================================================================
# SECTION 5: PHP TOOLS REGISTRY
# =============================================================================
tools_registry:

  canonical_location: "docs/tooling/php-afd/"
  note: |
    ConsensusPress ships its own PHP AFD tooling suite (built Session 03).
    These are not symlinks — they are project-owned.
    22/22 PHPUnit tests passing at last run (Session 03).

  tools:

    hal001_php_scanner:
      file: "docs/tooling/php-afd/hal001_php_scanner.php"
      purpose: |
        PHP AST-based HAL-001 scanner. Detects bare 'array' params/returns
        without WordPress hash notation shape in PHPDoc.
        Distinguishes: real violations, false positives, hash-notation typed.
      usage: "php docs/tooling/php-afd/hal001_php_scanner.php plugin/consensuspress/includes/"
      exit_codes: "0 = no real violations. Non-zero = violations present."
      tests: "docs/tooling/php-afd/tests/Hal001ScannerTest.php"
      gate: "Gate 2 (C-C delivery) and Gate 3 (D-C QC) and Gate 4 (deploy)"
      upgrade_note: |
        Scanner fixed in Session 03 — 5 bug fixes applied:
        (2a) tests dir excluded, (2b) ABSPATH search range extended,
        (2c) WP_UNINSTALL_PLUGIN recognised, (2d) string literal <script> excluded,
        (2e) WordPress hash notation recognition added.

    wp_compliance_scanner:
      file: "docs/tooling/php-afd/wp_compliance_scanner.php"
      purpose: |
        WordPress.org compliance scanner. Checks: sanitization, escaping,
        nonces, inline JS/CSS, hardcoded secrets, missing ABSPATH guards.
      usage: "php docs/tooling/php-afd/wp_compliance_scanner.php plugin/consensuspress/"
      exit_codes: "0 = compliant. Non-zero = violations."
      tests: "docs/tooling/php-afd/tests/WpComplianceTest.php"
      gate: "Gate 2 (C-C delivery) and Gate 3 (D-C QC)"

    inventory_php:
      file: "docs/tooling/php-afd/inventory_php.php"
      purpose: |
        PHP AST-based function and method inventory tool.
        Produces machine-readable YAML for D0 preservation contract in CCI.
        Captures: name, line, class, kind, visibility, must_preserve.
      usage: "php docs/tooling/php-afd/inventory_php.php plugin/consensuspress/includes/class-NAME.php"
      output: "YAML block ready to paste into CCI D0"
      tests: "docs/tooling/php-afd/tests/InventoryTest.php"
      gate: "Gate 1 (D-C specification — D0 population)"
      critical_rule: |
        D0 must NEVER be populated manually.
        Always machine-generated via inventory_php.php.
        A D0 without the inventory_generated_at timestamp = FAIL.

    phpunit:
      file: "plugin/consensuspress/vendor/bin/phpunit"
      command: "plugin/consensuspress/vendor/bin/phpunit -c tests/phpunit.xml"
      purpose: "Full regression suite — 62 tests, 135 assertions"
      baseline: "62 tests GREEN (Session 11, 2026-03-06)"
      growth: "New tests added each sprint — baseline grows"
      gate: "Gate 2 (C-C) and Gate 3 (D-C QC)"
      critical_note: |
        phpunit.xml uses explicit <file> entries — NOT directory scan.
        PHPUnit 9 default suffix *Test.php silently skips test-*.php files.
        Decision D-CP-10-02: explicit <file> entries only (irreversible).

# =============================================================================
# SECTION 6: CCI TRIGGER PROTOCOL — CONSENSUSPRESS
# =============================================================================
cci_trigger_protocol:

  keyword: "CCI: <target_file>"
  example: "CCI: class-consensuspress-post-builder.php"

  d_c_obligations_on_trigger:
    step_1: "Load c_c_instruction_template.yaml from project knowledge"
    step_2: "Load c_c_coding_standards.yaml from project knowledge"
    step_3: "Run: php docs/tooling/php-afd/inventory_php.php <target_file>"
    step_4: "Paste machine output into D0 — NEVER populate manually"
    step_5: "Fill D1: WordPress hash notation for every array boundary"
    step_6: "Fill D2: balance_check for meta keys, hooks, API contracts"
    step_7: "Fill D4: scenarios derived from existing PHPUnit test names"
    step_8: "D-C checklist: D0 populated? D1 shapes named? D2 balanced? No forward refs?"
    step_9: "Deliver CCI — Mohan reviews before handing to C-C"

  mohan_gate: |
    Mohan does not hand CCI to C-C without reviewing:
    - D0 has machine-generated timestamp
    - D1 has no bare 'array' boundaries
    - D2 balance_check is BALANCED, not PENDING
    - No forward-reference decision IDs

  c_c_stop_rules:
    STOP-1: "Array boundary not named in D1 with hash notation? STOP. Report to D-C."
    STOP-2: "Method in D0 absent from output? STOP. Confirm with D-C."
    STOP-3: "ILL-3 N/A — plugin has no LLM calls. If adding one: STOP. Escalate to D-C."
    STOP-4: "Anything in D1-D7 ambiguous? STOP and escalate."
    STOP-5: "Delivering without preservation_manifest? STOP."
    STOP-6: "Writing a conditional branch with no D-doc origin? STOP. Report to D-C."

# =============================================================================
# SECTION 7: DEFERRAL TAXONOMY — PHP ADAPTATION
# =============================================================================
deferral_taxonomy:

  purpose: |
    Not every bare 'array' can be typed in the sprint where it is found.
    Three resolution paths — identical to Python parent system.

  format: |
    Inline in code:
      @return array  // HAL-001-DEFERRED [TYPE-B] D-CP-11-01
      // reason: JSON-LD schema array — shape defined by wp_json_encode contract
      // trigger: Schema TypedDict sprint — post Sprint 8

    In CCI D1 deferred_boundaries:
      - location: "generate_faq_schema(), line ~468, return type"
        annotation: "HAL-001-DEFERRED"
        type: "TYPE-B"
        decision_id: "D-CP-11-01"
        reason: "JSON-LD FAQPage array — all fields defined internally"
        trigger: "Schema shape typing sprint — post WordPress.org submission"

  type_a:
    name: "Architectural Blocker"
    cannot_resolve: "In-sprint — requires structural change"
    examples:
      - "Requires new shared PHP types file not yet created"
      - "Circular dependency between includes/"

  type_b:
    name: "Solvable But Expensive"
    cannot_resolve: "Technically typeable — cost exceeds sprint budget"
    examples:
      - "JSON-LD schema arrays with 10+ optional fields"
      - "WordPress WP_Post object mock shapes"
    current_instances:
      - "generate_faq_schema() return — JSON-LD FAQPage shape"
      - "generate_article_schema() return — JSON-LD Article shape"

  type_c:
    name: "Blocked On External Evidence"
    cannot_resolve: "Cannot type without examining actual external outputs"
    examples:
      - "Railway API response shape before live endpoint confirmed"
      - "Unsplash API response before Sprint 8 implementation"

  forward_reference_prohibition: |
    decision_id must reference the CURRENT or a PAST session.
    D-CP-11-01 is valid in Session 11. D-CP-15-01 is not.

