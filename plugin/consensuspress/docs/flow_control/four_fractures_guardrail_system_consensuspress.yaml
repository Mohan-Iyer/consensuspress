# FOUR ILLS GUARDRAIL SYSTEM — CONSENSUSPRESS v1.0.0
# =============================================================================
# file:      docs/flow_control/four_ills_guardrail_system_consensuspress.yaml
# purpose:   ConsensusPress adaptation of the canonical Four LLM Ills Guardrail
#            System. PHP/WordPress-specific tooling, enforcement chain, and
#            proof of current codebase compliance.
# status:    CANONICAL — ConsensusPress project
# created:   2026-03-06
# session:   11
# author:    D-C (Mohan Iyer + Designer Claude)
#
# parent_document:
#   four_ills_guardrail_system.yaml v1.0.0 (Sessions 112-113, Seekrates AI)
#   This document extends the parent — it does not replace it.
#   Language: PHP (WordPress plugin) instead of Python.
#   Scanner:  hal001_php_scanner.php (AST-based, PHPUnit-tested) instead of
#             hal001_scanner.py.
#   Type system: WordPress hash notation array{key: type} instead of TypedDict.
#
# current_compliance_status:
#   CERTIFIED CLEAN — Session 11 scan, 2026-03-06.
#   All four ills: PASS. Details in Section 4.
# =============================================================================

# =============================================================================
# SECTION 1: THE INSIGHT (PHP CONTEXT)
# =============================================================================
the_insight:

  origin: "Sessions 112-113 (Seekrates AI Python) — adapted Session 11 (ConsensusPress PHP)"

  breakthrough: |
    The same four failure modes that plague Python LLM code apply equally to
    PHP LLM-assisted code. The mechanisms differ slightly:
      - ILL-1: PHP uses bare 'array' instead of Dict[str, Any]
      - ILL-2: WordPress meta key renames propagate silently (proven: Session 10
        meta key mismatch — 'champion' vs 'champion_provider' — caused 2 test
        failures diagnosed across 4 deployment cycles)
      - ILL-3: No LLM calls in plugin (thin client) — ILL-3 is structurally absent
      - ILL-4: C-C drops functions on rewrite — proven multiple times in Sessions 07-09

    The fence is at the specification level, not the code level.
    D-C's CCI must name typed array shapes for every array boundary.
    C-C cannot produce type erasure without violating its own STOP rules.

  principle: |
    Constraint prevents. Detection corrects.
    Prevention is always cheaper than correction.
    The goal is to make the wrong output structurally impossible —
    not to catch it after it has been generated.

  php_specific_note: |
    PHP's type system is weaker than Python's. WordPress adds its own patterns.
    The defence adapts accordingly:
      - WordPress hash notation: @return array{key: type, ...} in PHPDoc
      - WP_Error returns must be explicitly checked: is_wp_error()
      - WordPress hooks are invisible contracts — must be in D2
      - All array boundaries in D1 must use hash notation, not bare 'array'

# =============================================================================
# SECTION 2: THE FOUR ILLS — PHP/WORDPRESS ADAPTATION
# =============================================================================
four_ills:

  ill_1:
    name: "Hallucination / Type Erasure"
    code: "ILL-1"
    php_mechanism: |
      C-C writes @return array or @param array $data with no shape defined.
      PHP does not raise an error. Callers access $result['key'] blindly.
      The bug is invisible until runtime: undefined array key or wrong value
      silently delivered to WordPress post meta or REST response.
    php_example: |
      # Wrong: bare array — no shape knowledge
      # @return array
      public function create_draft( array $api_data ): array { ... }

      # Right: WordPress hash notation
      # @return array{success: bool, post_id: int|null, error: string|null}
      public function create_draft( array $api_data, string $mode ): array { ... }
    failure_mode: "Runtime undefined array key. Silent wrong value in post meta."
    proven_instance: |
      Session 10 — FIXTURE_CREATE_SUCCESS passed as flat engine shape.
      API class expected {success: true, data: {...}} envelope.
      validate_api_data() silently failed. create_draft() returned success:false.
      6 deployment cycles before root cause traced. HAL-008 (Unverified Assumption).
    defence: |
      PRIMARY FENCE: D-C CCI D1 section defines WordPress hash notation for
      every array boundary. bare 'array' in PHPDoc without shape = invalid CCI.
      EXECUTION NET: hal001_php_scanner.php must EXIT 0 before C-C delivery.
    standards: "CCS-001 (adapted), D1 hash notation requirement in CCI"
    scanner_tool: "docs/tooling/php-afd/hal001_php_scanner.php"
    scanner_command: "php docs/tooling/php-afd/hal001_php_scanner.php plugin/consensuspress/includes/"

  ill_2:
    name: "DNA Cascade Corruption"
    code: "ILL-2"
    php_mechanism: |
      Producer renames an array key or WordPress meta key. Consumer still
      reads the old name. get_post_meta() returns empty string silently.
      No exception. No error. Meta box renders empty. Content is wrong.
    php_example: |
      # Post-builder v2.0.0 renamed meta keys Sprint 7:
      #   'champion'      → 'champion_provider'
      #   'agreement'     → 'agreement_level'
      #   'oracle_risk'   → 'oracle_risk_level'
      # Meta-box still read old names → test failures → 4 deployment cycles.
      # This is the canonical ConsensusPress ILL-2 proof case.
    failure_mode: "Silent empty meta values. Wrong display in meta box or admin UI."
    proven_instance: |
      BUG-10-06: CONSENSUS_META_KEYS used Sprint 3 key names.
      Sprint 7 post-builder renamed all three. Meta-box silently got empty values.
      Fixed: class-consensuspress-meta-box.php v1.1.0 — CONSENSUS_META_KEYS updated.
    defence: |
      D2 double-entry contracts in every CCI — every meta key write must
      name its reader, every meta key read must name its writer.
      WordPress hooks are OUTPUT/INPUT contracts — must be balance-checked.
      spec_lint (PHP adaptation) enforces before handoff.
    standards: "CCS-010 (adapted), CCS-016, D2 balance_check in CCI"

  ill_3:
    name: "Format Contract Failure"
    code: "ILL-3"
    php_mechanism: |
      An LLM-calling function does not specify expected output format.
      Function returns markdown when HTML is required, raw text when
      JSON-LD schema is expected.
    current_status: |
      STRUCTURALLY ABSENT from ConsensusPress plugin.
      Plugin is a thin API client — all LLM calls are server-side (Railway).
      Plugin receives structured JSON from Seekrates AI engine.
      No LLM-calling functions exist in PHP codebase.
      Session 11 scan: zero LLM function calls confirmed.
    residual_risk: |
      ILL-3 could emerge in Sprint 8 only if a future sprint adds direct
      LLM calls to the plugin — which would violate the thin-client
      architecture principle (D-08-06). That decision would require explicit
      D-C approval and would reactivate ILL-3 guardrails.
    defence: |
      Architecture is the fence. Thin-client principle (D-08-06) makes
      ILL-3 structurally impossible. If llm_functions_present becomes true
      in any future CCI, D3 format contracts become mandatory immediately.
    standards: "D-08-06 (thin-client architecture decision — irreversible)"

  ill_4:
    name: "Silent Omission"
    code: "ILL-4"
    php_mechanism: |
      C-C rewrites a PHP class. Zero HAL-001 violations. PHPUnit green.
      DNA header correct. Three private methods have been quietly dropped.
      No scanner detects absence. Downstream WordPress hook call raises
      fatal error. Or worse: wrong method silently called.
    php_example: |
      # Session 09: C-C invented wrong interface name:
      #   'implements ConsensusPress_Transport' (non-existent)
      #   instead of 'implements ConsensusPress_Transport_Interface' (Sprint 1)
      # Session 09: Constructor $transport injection parameter silently dropped.
      # Session 09: Mock_Transport constructor arg order reversed.
      # All three = ILL-4 variants — omission or mutation of existing contract.
    failure_mode: "Fatal PHP error or wrong constructor contract. Silent wrong behaviour."
    proven_instances:
      - "BUG-09-01: Wrong interface name (ConsensusPress_Transport invented)"
      - "BUG-09-02: Dropped transport injection constructor parameter"
      - "BUG-09-03: Reversed Mock_Transport constructor arg order"
    defence: |
      D0 preservation contract in every CCI — machine-generated by
      inventory_php.php. Every public method listed with must_preserve flag.
      C-C delivers preservation_manifest.yaml alongside every file.
      D-C QC: diff against D0 inventory. Zero unaccounted methods required.
    standards: "CCS-018 (adapted), D0 preservation contract mandatory"
    scanner_tool: "docs/tooling/php-afd/inventory_php.php"
    scanner_command: "php docs/tooling/php-afd/inventory_php.php plugin/consensuspress/includes/class-NAME.php"

# =============================================================================
# SECTION 3: THE GUARDRAIL STACK — PHP ADAPTATION
# =============================================================================
guardrail_stack:

  philosophy: |
    Four gates. Each owned by the entity that cannot be the source of
    the failure it guards against. Identical to the Python parent system.
    Tools differ — PHP scanners replace Python AST tools.

  gate_1:
    name: "Specification Gate"
    owner: "D-C + Mohan"
    trigger: "Mohan types: CCI: <target_file>"
    what_happens: |
      D-C runs inventory_php.php on target file — pastes output into D0.
      D-C fills D1 (hash notation shapes), D2 (meta key contracts), D4–D7.
      D-C verifies: all public methods in D0, all array shapes named in D1,
      all meta key reads/writes balanced in D2.
      Mohan reviews before handing to C-C.
    ills_addressed: "ILL-1 (D1 shapes), ILL-2 (D2 meta key balance), ILL-4 (D0 inventory)"
    tool: "docs/tooling/php-afd/inventory_php.php"
    enforcement: "Mohan holds the handoff. D-C cannot bypass Mohan."
    note: |
      spec_lint.py is a Python tool (canonical). PHP adaptation uses
      manual D-C checklist until a PHP spec_lint is built.
      D-C checklist items: D0 populated? D1 hash notation? D2 balanced?

  gate_2:
    name: "Execution Gate"
    owner: "C-C"
    trigger: "C-C receives CCI from Mohan"
    what_happens: |
      C-C reads STOP rules embedded at top of every CCI.
      C-C implements per D1–D7 — no design decisions permitted.
      C-C runs hal001_php_scanner.php on output — EXIT 0 required.
      C-C runs wp_compliance_scanner.php — EXIT 0 required.
      C-C completes preservation_manifest — all D0 methods accounted.
      C-C runs PHPUnit — 62/62 green required (regression gate).
      C-C delivers: production file + preservation manifest + scanner outputs.
    ills_addressed: "ILL-1 (scanner), ILL-4 (manifest)"
    tools:
      - "docs/tooling/php-afd/hal001_php_scanner.php"
      - "docs/tooling/php-afd/wp_compliance_scanner.php"
      - "plugin/consensuspress/vendor/bin/phpunit -c tests/phpunit.xml"
    enforcement: "STOP rules in CCI. Delivery incomplete without manifest + scanner EXIT 0."

  gate_3:
    name: "QC Gate"
    owner: "D-C"
    trigger: "C-C delivers files"
    what_happens: |
      Step 1: hal001_php_scanner.php on output file — non-zero = REJECT.
      Step 2: wp_compliance_scanner.php — non-zero = REJECT.
      Step 3: preservation_manifest — all D0 methods accounted.
      Step 4: D1 hash notation shapes present in delivered code.
      Step 5: PHPUnit 62/62 green (62 = Sprint 7 baseline — grows each sprint).
      Step 6: HAL-001 through HAL-008 scan.
      Verdict: ACCEPTED or REJECTED with specific reasons.
    ills_addressed: "ILL-1, ILL-2, ILL-4"
    enforcement: "D-C cannot self-certify at Gate 1 — QC is independent review."

  gate_4:
    name: "Deployment Gate"
    owner: "WordPress.org submission / Railway deploy"
    trigger: "Sprint delivery or WordPress.org packaging"
    what_happens: |
      hal001_php_scanner.php across full plugin/consensuspress/includes/.
      wp_compliance_scanner.php across full plugin tree.
      Non-zero violations abort submission with printed report.
      WordPress.org plugin check never receives code with active violations.
    ills_addressed: "ILL-1, WP compliance (final net before distribution)"
    status: "DECIDED — manual run. Automation in Sprint 8 packaging step."

