  - id: "D-01-03"
    decision: "14 hallucination markers (8 core + 6 WordPress-specific)"
    rationale: "WordPress.org reviewers check HAL-WP-001→003 (sanitize, escape, nonce). AI-generated PHP hallucinates these at high rate."
    reversible: false
    author: "D-C"
    approved_by: "Mohan (implicit)"

  - id: "D-01-04"
    decision: "6-sprint build plan: Foundation → Create → Async → Rescue → Usage → Packaging"
    rationale: "Dependency order from HLR build sequence. MVP after Sprint 3 (Create mode working)."
    reversible: true
    author: "D-C"
    approved_by: "Mohan (pending formal review)"

  - id: "D-01-05"
    decision: "PHP 7.4 baseline — no union types, no enums, no typed class constants"
    rationale: "HLR requires PHP 7.4 minimum for WordPress.org compatibility. Constrains D1 type declarations."
    reversible: true
    author: "D-C"
    approved_by: "Mohan (implicit — set in HLR)"

  - id: "D-01-06"
    decision: "Post scheduling must not clash with WordPress daily backup processes"
    rationale: "Mohan requirement: draft posts created at e.g. 12:01pm must not interfere with site backup cron"
    reversible: true
    author: "Mohan (requirement)"
    detail: |
      ConsensusPress creates drafts, not published posts. Drafts should
      not trigger backup-intensive operations. However, if the plugin uses
      wp_insert_post() during a running backup, database locks could cause
      timeouts. D-C must consider: (a) document recommended backup scheduling
      in readme.txt, (b) consider wp_schedule_single_event() to defer
      draft creation to a non-backup window, (c) at minimum, don't auto-publish.

  - id: "D-01-07"
    decision: "Gemini + Claude WP plugin technical analysis incorporated into HLR v1.1.0"
    rationale: "10 subsections added: hooks, lifecycle, persistence, security, assets, autoloading, REST, WP-Cron, Settings API, update mechanism"
    reversible: false
    author: "D-C (synthesis of Gemini analysis + Claude commentary)"
    approved_by: "Mohan (directed the incorporation)"

