# =============================================================================
# SECTION 8: KEY INSIGHTS
# =============================================================================
key_insights:

  - insight: "The mock IS the contract, not a testing convenience"
    lesson: |
      When the live endpoint is built, it must match the mock fixtures.
      If it diverges, fix the endpoint, not the tests. This inverts the
      usual pattern where tests conform to implementation. Here, the
      specification (mock) was defined first, and both plugin AND endpoint
      must conform to it. Session 37 would not have happened if the
      posting_calendar had been validated against the consumer's expectations.

  - insight: "WordPress HAL markers are distinct from Python HAL markers"
    lesson: |
      AI-generated PHP hallucinates different patterns than Python.
      The top 3 WordPress hallucinations: unsanitised $_POST (HAL-WP-001),
      unescaped echo $var (HAL-WP-002), and missing nonces (HAL-WP-003).
      These are the exact things WordPress.org reviewers catch. Adding
      6 WP-specific markers to the existing 8 core markers gives us 14
      automated checks that prevent the most common AI-generated PHP bugs.

  - insight: "Post scheduling vs backup timing is a real production concern"
    lesson: |
      Mohan flagged that draft creation timing must not clash with daily
      WordPress backup processes. This is not theoretical — wp_insert_post()
      during a running backup can cause database locks and timeouts. The
      solution space includes: deferred creation via WP-Cron, backup-aware
      scheduling, or simply documenting recommended backup windows in readme.txt.
      This also connects to the 30-60s timeout problem — wp_schedule_single_event()
      might solve both issues simultaneously.

  - insight: "First PHP project under AFD requires explicit language adaptation"
    lesson: |
      AFD was designed for Python (Pydantic, pytest, Dict[str,Any] scans).
      For PHP: D1 becomes typed class signatures with PHPDoc, D4 becomes
      PHPUnit, D6 specifies hook registrations and priorities (design decisions
      that C-C must not make), HAL-001 scans for untyped params instead of
      Dict[str,Any]. The principles are language-agnostic but every concrete
      check needs adaptation. 15 PHP-specific risks identified this session.

