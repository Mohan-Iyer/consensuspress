decisions:

  - id: "D-08-03"
    decision: "Synchronous JSON (Option A) for Railway endpoint — plugin holds connection open"
    rationale: "Matches existing WP-Cron + AJAX polling architecture. No callback infrastructure needed."
    reversible: false

  - id: "D-08-04"
    decision: "Auth via user_manager.validate_session() — consensuspress_api_key IS the session token"
    rationale: "No new key management layer. Existing user_manager.py handles validation."
    reversible: false

  - id: "D-08-05"
    decision: "T&C gate handled in plugin — seekrates_ai server codebase unchanged"
    rationale: "Mohan requirement: keep seekrates_ai pristine. Plugin catches needs_tc_acceptance at HTTP 200."
    reversible: true

  - id: "D-08-06"
    decision: "All content production (HTML/SEO/schema) in PHP post-builder — server is thin wrapper only"
    rationale: |
      Preserves thin-client IP protection principle. Server = intelligence layer.
      Plugin = WordPress-native delivery. PHP port of content_formatter.py is ~350 lines
      of deterministic string manipulation — no LLM calls, no external services.
    reversible: false

  - id: "D-08-07"
    decision: "Unsplash featured image deferred to Sprint 8"
    rationale: "Non-blocking. Posts work without featured image. Reduces Sprint 7 scope."
    reversible: true

  - id: "D-08-08"
    decision: "query field injected by endpoint into response data dict"
    rationale: "query not in ConsensusResult Pydantic model. Plugin needs it for focus_keyword extraction."
    reversible: false

  - id: "D-08-09"
    decision: "content_formatter.py + seo_optimizer.py ported to PHP — not replicated server-side"
    rationale: |
      Server-side port would require new LLM call per request (additional cost + latency).
      PHP port is pure string manipulation — deterministic, zero cost, zero latency.
    reversible: false

