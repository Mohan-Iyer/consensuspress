# =============================================================================
# SECTION 8: KEY INSIGHTS
# =============================================================================
key_insights:

  - insight: "spec-first analysis prevents architectural drift even across 8 sessions"
    lesson: |
      HAL-008 (unverified assumption) was in the spec since Session 03 but
      did not cause a build failure because mocks shielded the tests.
      It surfaced only when the real server files were uploaded. The mock_api
      spec is the contract — it must be verified against real code before C-C
      touches the implementation. AFD methodology contained the blast radius.

  - insight: "seekrates_publisher was the missing context — always upload related codebases"
    lesson: |
      The architecture question (where does content_html come from?) could not
      be answered from auth_endpoints.py and consensus_engine.py alone.
      seekrates_publisher_src.zip provided the bridge. When a system has
      multiple interconnected codebases, all must be reviewed before
      speccing the integration layer.

  - insight: "PHP port of Python content pipeline is viable and preferable"
    lesson: |
      content_formatter.py + seo_optimizer.py are ~1,200 lines of Python.
      The PHP port is ~350 lines because the WordPress context provides
      wp_insert_post(), update_post_meta(), and wp_kses_post() which
      handle the delivery work. The content generation logic itself is
      deterministic string manipulation — language-agnostic.

  - insight: "Thin-client architecture preserved despite content pipeline move"
    lesson: |
      Moving content generation to the plugin does NOT violate the thin-client
      principle because: (1) the content is derived from the engine's raw output,
      not generated independently; (2) all 5-LLM consensus intelligence stays
      on Railway; (3) the plugin is doing WordPress-native formatting work,
      not AI reasoning. IP protection is intact.

