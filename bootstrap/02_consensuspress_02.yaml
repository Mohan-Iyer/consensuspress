# =============================================================================
# KEY INSIGHTS
# =============================================================================
key_insights:

  - insight: "Scanners must speak the project's dialect"
    lesson: |
      HAL-001 scanner only recognised PSR-style array shapes. WordPress uses
      hash notation (@param array $var { @type ... }). Building a WordPress
      plugin with a Python-convention scanner causes false failures. Path B
      (fix scanner) was correct over Path A (change PHPDoc style) — invest
      in tooling that matches your domain.

  - insight: "Repo structure IS architecture"
    lesson: |
      1,870 files of confusion meant nobody — human or AI — could navigate
      the project. Cutting to 45 files with clear separation (plugin/, tests/,
      docs/, plans/) eliminated an entire class of errors: wrong file edited,
      dead code shipped, test files in production. The cleanup took 30 minutes.
      The confusion cost hours across sessions.

  - insight: "Phase 0 tooling pays for itself immediately"
    lesson: |
      Building scanners BEFORE Sprint 2 means every line of Sprint 2 code
      is machine-verified at delivery. Without Phase 0, HAL-001 violations
      accumulate silently and become a remediation sprint later. The scanner
      suite cost one session. It saves every future session.

  - insight: "D1 specs that include sanitise/escape per field eliminate WP compliance issues"
    lesson: |
      Sprint 2 D1 names the exact WordPress sanitisation function for every
      input field and escape function for every output. C-C copies these
      verbatim. No judgement calls, no omissions, no WP reviewer rejections.

