# =============================================================================
# DECISIONS
# =============================================================================
decisions:

  - id: "D-03-01"
    decision: "Production code lives at plugin/consensuspress/ — this folder gets zipped for WP.org"
    rationale: "Clean separation of shippable vs dev-only. Tests, docs, tooling never enter the zip."
    reversible: false

  - id: "D-03-02"
    decision: "Tests live at repo root tests/ — not inside plugin/"
    rationale: "WP.org reviewers flag test files inside plugin directory. Keeps plugin/ sacred."
    reversible: false

  - id: "D-03-03"
    decision: "WordPress hash notation is the project PHPDoc standard (not PSR inline)"
    rationale: "WordPress plugin, WordPress conventions. Scanner now recognises both. Path B chosen over Path A to avoid future maintenance."
    reversible: false

  - id: "D-03-04"
    decision: "Sprint 2 Create Mode uses synchronous AJAX, not async"
    rationale: "Simpler, testable. Sprint 3 adds WP-Cron async upgrade. Don't front-load complexity."
    reversible: true

  - id: "D-03-05"
    decision: "Post Builder is a separate class, reusable by both Create and Rescue"
    rationale: "Both modes produce WordPress drafts from API data. Same class, same meta injection, same image sideload. DRY."
    reversible: false

  - id: "D-03-06"
    decision: "All consensus metadata stored as underscore-prefixed post_meta from Sprint 2"
    rationale: "Sprint 3 meta box reads these keys. Writing them now means Sprint 3 is read-only UI work, no data migration."
    reversible: false

  - id: "D-03-07"
    decision: "Rank Math fields always written, regardless of Rank Math installation"
    rationale: "Graceful degradation. Values sit in post_meta. If RM activated later, it reads them immediately. Zero RM dependency in plugin code."
    reversible: false

  - id: "D-03-08"
    decision: "Vendor/ and composer.lock excluded from repo, reinstalled locally"
    rationale: "1,800 files of Composer deps are not source code. composer install recreates from composer.json."
    reversible: false

  - id: "D-03-09"
    decision: "AFD scanner gates are acceptance criteria from Sprint 2 onwards"
    rationale: "Phase 0.5 proved scanners work. If they fire, the D1 was defective — fix spec first, then re-implement. No patching."
    reversible: false

  - id: "D-03-10"
    decision: "PHP 7.4 minimum confirmed (updated from WP 5.8 to WP 6.2)"
    rationale: "Memory edit update. PHP 7.4+ means no union types, no enums, no typed class constants."
    reversible: true

